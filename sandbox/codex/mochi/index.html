<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MOCHI / Soft UI Bakery</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;800&display=swap');
:root{--cream:#fff1e3;--brown:#523b35;--pink:#ee86a5;--blue:#83cde0;--yellow:#f4cb69;--mint:#8bd4bc}*{box-sizing:border-box}
body{margin:0;background:var(--cream);color:var(--brown);font-family:Nunito,sans-serif;min-height:100vh}.bakery{min-height:100vh;overflow:hidden;background:radial-gradient(circle at 10% 15%,#fff 0 2px,transparent 3px),radial-gradient(circle at 83% 20%,#fff 0 3px,transparent 4px);background-size:38px 38px,53px 53px}
nav{margin:18px auto;width:min(1320px,94vw);height:70px;border-radius:25px;background:var(--cream);box-shadow:9px 9px 18px #d9c1af,-9px -9px 18px #fff;display:flex;align-items:center;justify-content:space-between;padding:0 25px;font-weight:800}nav a{color:inherit;text-decoration:none}.logo{font:800 26px "Baloo 2";}.logo b{color:var(--pink)}
.hero{min-height:730px;display:grid;grid-template-columns:.9fr 1.1fr;max-width:1400px;margin:auto;padding:4vw;align-items:center}.copy{padding:3vw}.flag{display:inline-block;background:var(--yellow);border-radius:8px;padding:7px 14px;transform:rotate(-3deg);box-shadow:4px 5px 0 #d2a950}h1{font:800 clamp(70px,11vw,155px)/.75 "Baloo 2";letter-spacing:-.06em;margin:25px 0;text-shadow:0 7px 0 #fff,0 12px 0 #e9cfc1}h1 span{color:var(--pink);display:block;margin-left:10%}.copy p{font-size:16px;line-height:1.7;max-width:440px}.pills{display:flex;gap:11px;margin-top:25px}.pills button{border:0;border-radius:99px;background:var(--cream);color:inherit;font-weight:800;padding:13px 18px;box-shadow:6px 6px 12px #d5bca9,-5px -5px 10px white;cursor:pointer}.pills button:active{box-shadow:inset 5px 5px 9px #d5bca9,inset -5px -5px 9px white;transform:scale(.96)}
.plate{height:610px;position:relative;display:grid;place-items:center}.dish{position:absolute;width:min(44vw,550px);height:130px;border-radius:50%;background:linear-gradient(#c9edf5,#77b9ca);bottom:80px;box-shadow:0 28px 30px #8f695644,inset 0 -18px 0 #6aa8b7}.mochi{position:relative;width:min(35vw,420px);height:340px;border-radius:48% 48% 42% 42% / 55% 55% 37% 37%;background:linear-gradient(145deg,#ffafc4,#e77c9b);box-shadow:inset 18px 20px 28px #ffd9e2,inset -22px -25px 30px #b95374,17px 25px 30px #9c6a7460;z-index:2;transition:.35s cubic-bezier(.2,1.8,.5,1);cursor:pointer}.mochi:before,.mochi:after{content:"";position:absolute;top:45%;width:25px;height:34px;border-radius:50%;background:var(--brown);box-shadow:inset 7px 7px #fff}.mochi:before{left:29%}.mochi:after{right:29%}.smile{position:absolute;left:42%;top:62%;width:16%;height:10%;border-bottom:7px solid var(--brown);border-radius:50%}.cheek{position:absolute;top:58%;left:13%;width:47px;height:18px;border-radius:50%;background:#ffcada;box-shadow:260px 0 #ffcada}.bite{position:absolute;right:-2px;top:18%;width:85px;aspect-ratio:1;border-radius:50%;background:var(--cream);box-shadow:-33px -27px 0 -8px var(--cream);display:none}.sprinkles{position:absolute;inset:0}.sprinkles i{position:absolute;width:18px;height:5px;border-radius:4px;background:var(--yellow);transform:rotate(var(--r));left:var(--x);top:var(--y)}.steam{position:absolute;top:50px;font-size:60px;color:#fff;animation:steam 2.5s ease-in-out infinite}.squish{transform:scaleX(1.17) scaleY(.72) translateY(60px)}.bitten .bite{display:block}.counter{position:absolute;right:1%;top:8%;background:var(--mint);border-radius:25px;padding:15px 18px;box-shadow:6px 7px 0 #5cab92;font-weight:800}.counter b{font-size:28px}
@keyframes steam{50%{transform:translateY(-18px);opacity:.4}}@media(max-width:800px){.hero{grid-template-columns:1fr}.plate{height:570px}.mochi{width:340px}.dish{width:430px}.counter{right:5%}}
</style>
</head>
<body><main class="bakery"><nav><div class="logo">M<b>O</b>CHI LAB ◡̈</div><span>SOFT UI BAKERY / DAILY FRESH</span><a href="../">ATLAS ↗</a></nav><section class="hero"><article class="copy"><span class="flag">HAND-SQUISHED WITH CARE!</span><h1>Soft is a<span>superpower.</span></h1><p>Plump controls, sugar-sprinkle status and surfaces that visibly give in when you press them.</p><div class="pills"><button id="poke">POKE IT</button><button id="bite">TAKE A BITE</button><button id="sprinkle">+ SPRINKLES</button></div></article><div class="plate"><span class="steam">〰</span><div class="counter">SQUISHES<br><b id="count">00</b></div><div class="mochi" id="mochi"><div class="sprinkles" id="sprinkles"></div><i class="smile"></i><i class="cheek"></i><i class="bite"></i></div><i class="dish"></i></div></section></main>
<script>
const mochi=document.querySelector("#mochi"),sprinkles=document.querySelector("#sprinkles");let count=0;function poke(){mochi.classList.add("squish");document.querySelector("#count").textContent=String(++count).padStart(2,"0");setTimeout(()=>mochi.classList.remove("squish"),360)}mochi.onclick=poke;document.querySelector("#poke").onclick=poke;document.querySelector("#bite").onclick=()=>mochi.classList.toggle("bitten");document.querySelector("#sprinkle").onclick=()=>{for(let i=0;i<8;i++){const s=document.createElement("i");s.style.cssText=`--x:${15+Math.random()*70}%;--y:${10+Math.random()*35}%;--r:${Math.random()*180}deg;background:hsl(${Math.random()*360} 70% 70%)`;sprinkles.append(s)}};
</script></body></html>

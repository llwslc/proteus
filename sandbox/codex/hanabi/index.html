<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HANABI / Cel Spark System</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+Rounded+1c:wght@500;800;900&display=swap');
:root{--sky:#dff4ff;--ink:#1d2d5a;--pink:#ff5d9e;--aqua:#43dfe1;--gold:#ffd95a;--purple:#8d78d9}*{box-sizing:border-box}
body{margin:0;background:linear-gradient(155deg,#effbff,var(--sky) 55%,#c9eaff);color:var(--ink);font-family:"M PLUS Rounded 1c",sans-serif;min-height:100vh;overflow-x:hidden}.page{min-height:100vh;position:relative;padding:22px;overflow:hidden}.page:before{content:"";position:absolute;inset:0;background-image:radial-gradient(#5f79ab38 1px,transparent 1px);background-size:14px 14px;mask-image:linear-gradient(90deg,#000,transparent 65%)}
nav{position:relative;z-index:5;border:3px solid var(--ink);border-radius:18px;background:#ffffffcc;box-shadow:5px 5px 0 var(--ink);height:64px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:900}nav a{color:inherit;text-decoration:none}.logo{font-size:24px}.logo b{color:var(--pink)}
.hero{position:relative;z-index:2;display:grid;grid-template-columns:.85fr 1.15fr;min-height:720px;align-items:center;max-width:1400px;margin:auto}.copy{padding:7vw 2vw}.kicker{display:inline-block;background:var(--gold);border:3px solid;border-radius:99px;padding:7px 14px;transform:rotate(-2deg);box-shadow:3px 3px 0 var(--ink);font:13px "DotGothic16"}
h1{font-size:clamp(64px,9vw,145px);line-height:.82;letter-spacing:-.07em;margin:28px 0;text-shadow:6px 6px 0 #fff,10px 10px 0 var(--purple)}h1 span{color:var(--pink);display:block;margin-left:12%}.copy p{max-width:480px;font-size:15px;line-height:1.75}.power{display:flex;gap:12px;margin-top:28px}.power button{border:3px solid var(--ink);border-radius:14px;padding:13px 18px;background:white;color:inherit;font-weight:900;box-shadow:4px 4px 0 var(--ink);cursor:pointer}.power .hot{background:var(--pink);color:white}
.cel{position:relative;display:grid;place-items:center;min-height:650px}.burst{position:absolute;width:min(48vw,610px);aspect-ratio:1;background:var(--gold);clip-path:polygon(50% 0,60% 29%,85% 15%,72% 40%,100% 50%,71% 61%,86% 85%,59% 72%,50% 100%,40% 71%,15% 86%,29% 59%,0 50%,29% 39%,14% 15%,41% 29%);filter:drop-shadow(8px 8px 0 var(--ink));animation:spin 30s linear infinite}
.mascot{position:relative;width:min(38vw,470px);aspect-ratio:.8;background:var(--pink);border:5px solid var(--ink);border-radius:48% 48% 42% 42%;box-shadow:14px 14px 0 var(--purple);transition:.5s cubic-bezier(.2,1.5,.5,1)}.mascot:before,.mascot:after{content:"";position:absolute;width:29%;height:38%;background:var(--pink);border:5px solid var(--ink);top:-14%;z-index:-1}.mascot:before{left:8%;transform:rotate(-25deg);border-radius:80% 10%}.mascot:after{right:8%;transform:rotate(25deg);border-radius:10% 80%}
.face{position:absolute;inset:25% 15%;background:#fff1dd;border:5px solid var(--ink);border-radius:48% 48% 52% 52%}.eye{position:absolute;top:34%;width:20%;height:30%;background:var(--ink);border-radius:50%;box-shadow:inset 6px 8px #fff}.eye.left{left:18%}.eye.right{right:18%}.mouth{position:absolute;left:43%;top:68%;width:15%;height:8%;border-bottom:5px solid;border-radius:50%}.badge{position:absolute;right:-7%;top:6%;background:var(--aqua);border:4px solid;border-radius:50%;width:110px;aspect-ratio:1;display:grid;place-items:center;text-align:center;font-weight:900;transform:rotate(12deg);box-shadow:6px 6px 0 var(--ink)}
.meter{position:absolute;bottom:5%;right:4%;left:4%;height:22px;border:3px solid;background:#fff;border-radius:99px;overflow:hidden}.meter i{display:block;width:36%;height:100%;background:repeating-linear-gradient(135deg,var(--aqua) 0 10px,#fff 10px 15px);transition:.8s}.charged .mascot{transform:translateY(-25px) scale(1.05);filter:drop-shadow(0 0 25px white)}.charged .meter i{width:100%;background:repeating-linear-gradient(135deg,var(--pink) 0 10px,var(--gold) 10px 20px)}.spark{position:absolute;font-size:38px;color:white;animation:blink 1s step-end infinite}.s1{left:10%;top:18%}.s2{right:7%;bottom:20%}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes blink{50%{transform:scale(.4);opacity:.2}}@media(max-width:820px){.hero{grid-template-columns:1fr}.copy{padding-top:70px}.cel{min-height:560px}.burst{width:500px}.mascot{width:330px}h1{font-size:74px}}
</style>
</head>
<body><main class="page" id="page"><nav><div class="logo">✦ <b>HANABI</b> / はなび</div><span>CEL-SPARK UI SYSTEM</span><a href="../">THEME INDEX ↗</a></nav>
<section class="hero"><article class="copy"><span class="kicker">新しい冒険がはじまる！</span><h1>MAKE IT<span>SPARK!</span></h1><p>Bright cel shadows, locked ink outlines and elastic controls — a component world with enough energy to leap off the frame.</p><div class="power"><button class="hot" id="charge">CHARGE UP ✦</button><button id="wink">WINK!</button></div></article>
<div class="cel"><i class="burst"></i><span class="spark s1">✦</span><span class="spark s2">✦</span><div class="mascot"><div class="face"><i class="eye left"></i><i class="eye right"></i><i class="mouth"></i></div><div class="badge">LEVEL<br>MAX!</div></div><div class="meter"><i></i></div></div></section></main>
<script>
const page=document.querySelector("#page");document.querySelector("#charge").onclick=()=>page.classList.toggle("charged");
document.querySelector("#wink").onclick=()=>{const eye=document.querySelector(".eye.right");eye.animate([{transform:"scaleY(1)"},{transform:"scaleY(.08)"},{transform:"scaleY(1)"}],{duration:450})};
</script></body></html>

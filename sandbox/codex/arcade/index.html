<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ARCADE / Neon Maze</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
:root{--black:#05050a;--blue:#25b9ff;--pink:#ff366f;--yellow:#ffe83c;--cyan:#28f4c7;--white:#f3f5de}*{box-sizing:border-box}
body{margin:0;background:#130f18;color:var(--white);font-family:"Press Start 2P",monospace;min-height:100vh}.cabinet{min-height:100vh;max-width:1150px;margin:auto;background:#090813;border-left:18px ridge #3a3349;border-right:18px ridge #3a3349;box-shadow:0 0 90px #000;padding:18px}
.marquee{border:7px solid var(--yellow);background:var(--pink);padding:20px;text-align:center;font-size:clamp(26px,5vw,58px);color:var(--yellow);text-shadow:5px 5px #31205e;box-shadow:inset 0 0 18px white,0 8px 0 #14111d;animation:glow 1.2s step-end infinite}.scorebar{display:grid;grid-template-columns:1fr 1fr 1fr;text-align:center;padding:22px 6px 12px;font-size:11px;line-height:2;color:var(--cyan)}.scorebar b{display:block;color:var(--white)}
.screen{position:relative;border:15px solid #27242f;border-radius:35px;background:#020205;min-height:580px;overflow:hidden;box-shadow:inset 0 0 80px #13105b,0 15px 30px #000}.screen:after{content:"";position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent 0 3px,#0007 4px);z-index:8}.game{width:484px;height:484px;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:grid;grid-template-columns:repeat(11,44px);grid-template-rows:repeat(11,44px);background:#03030b;border:4px solid var(--blue);box-shadow:0 0 12px var(--blue)}
.cell{width:44px;height:44px;position:relative}.wall{background:var(--blue);box-shadow:inset 0 0 0 6px #171061}.dot:after{content:"";position:absolute;width:6px;height:6px;border-radius:50%;background:var(--yellow);left:19px;top:19px}.player{position:absolute;width:30px;height:30px;border-radius:50%;background:var(--yellow);z-index:4;left:7px;top:7px;clip-path:polygon(0 0,100% 0,55% 50%,100% 100%,0 100%);transition:left .08s linear,top .08s linear}.ghost{position:absolute;width:28px;height:30px;background:var(--pink);border-radius:50% 50% 15% 15%;left:7px;top:7px;box-shadow:0 0 9px var(--pink);animation:ghost 1s steps(2) infinite}.ghost:after{content:"••";color:white;letter-spacing:5px;position:absolute;left:4px;top:2px}
.start{position:absolute;z-index:9;inset:0;display:grid;place-items:center;background:#020205dd;text-align:center;font-size:18px;color:var(--yellow);cursor:pointer}.start small{font:24px VT323;display:block;color:white;margin-top:18px}.started .start{display:none}.controls{display:flex;justify-content:space-between;align-items:center;padding:28px 7%}.dpad{display:grid;grid-template-columns:50px 50px 50px;grid-template-rows:50px 50px 50px}.dpad button{background:#282431;color:white;border:3px outset #4c4658;font-size:18px;cursor:pointer}.dpad .up{grid-column:2}.dpad .left{grid-column:1;grid-row:2}.dpad .down{grid-column:2;grid-row:2}.dpad .right{grid-column:3;grid-row:2}.coin{width:80px;aspect-ratio:1;border-radius:50%;border:8px outset #ff517f;background:var(--pink);color:white;font:8px inherit}.back{color:var(--cyan);font-size:9px}
@keyframes glow{50%{filter:brightness(1.35)}}@keyframes ghost{50%{transform:translateX(6px)}}@media(max-width:650px){.cabinet{padding:6px;border-width:6px}.screen{min-height:460px}.game{transform:translate(-50%,-50%) scale(.72)}.scorebar{font-size:8px}.controls{padding:18px 2%}}
</style>
</head>
<body><main class="cabinet" id="cabinet"><div class="marquee">NEON MAZE</div><div class="scorebar"><span>1UP<b id="score">000000</b></span><span>HIGH SCORE<b>009900</b></span><span>LIVES<b id="lives">♥ ♥ ♥</b></span></div>
<section class="screen"><div class="game" id="game"><i class="player" id="player"></i></div><div class="start" id="start">▶ PRESS START<small>ARROW KEYS / D-PAD TO MOVE</small></div></section>
<div class="controls"><div class="dpad"><button class="up" data-move="up">▲</button><button class="left" data-move="left">◀</button><button class="down" data-move="down">▼</button><button class="right" data-move="right">▶</button></div><button class="coin" id="coin">START</button><a class="back" href="../">EXIT TO ATLAS ↗</a></div></main>
<script>
const map=["11111111111","10000010001","10111010101","10001000101","11101110101","10000000101","10101111101","10100010001","10111010111","10000000001","11111111111"],game=document.querySelector("#game"),player=document.querySelector("#player");let x=1,y=1,score=0,started=false;
map.forEach((row,yy)=>[...row].forEach((v,xx)=>{const c=document.createElement("i");c.className="cell "+(v==="1"?"wall":"dot");c.dataset.pos=`${xx},${yy}`;game.append(c)}));const ghost=document.createElement("i");ghost.className="ghost";ghost.style.left=7+8*44+"px";ghost.style.top=7+5*44+"px";game.append(ghost);
function start(){started=true;document.querySelector("#cabinet").classList.add("started")}function move(dx,dy){if(!started)return;const nx=x+dx,ny=y+dy;if(map[ny]?.[nx]!=="0")return;x=nx;y=ny;player.style.left=7+x*44+"px";player.style.top=7+y*44+"px";const dot=document.querySelector(`[data-pos="${x},${y}"]`);if(dot?.classList.contains("dot")){dot.classList.remove("dot");score+=10;document.querySelector("#score").textContent=String(score).padStart(6,"0")}}
document.querySelector("#start").onclick=start;document.querySelector("#coin").onclick=start;document.querySelectorAll("[data-move]").forEach(b=>b.onclick=()=>({up:()=>move(0,-1),down:()=>move(0,1),left:()=>move(-1,0),right:()=>move(1,0)})[b.dataset.move]());addEventListener("keydown",e=>{const m={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]}[e.key];if(m){e.preventDefault();move(...m)}});
</script></body></html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BITMAP OS / 1-bit Interface Kit</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
*{box-sizing:border-box;image-rendering:pixelated}body{margin:0;background:#fff;color:#000;font:22px VT323,monospace;overflow:hidden}.desktop{height:100vh;position:relative;background-color:#fff;background-image:linear-gradient(45deg,#000 25%,transparent 25%),linear-gradient(-45deg,#000 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#000 75%),linear-gradient(-45deg,transparent 75%,#000 75%);background-size:4px 4px;background-position:0 0,0 2px,2px -2px,-2px 0}
.menu{height:40px;background:#fff;border-bottom:3px solid;display:flex;align-items:center;justify-content:space-between;padding:0 12px;position:relative;z-index:10}.menu button{font:inherit;background:white;border:0;padding:3px 10px}.menu button:hover{color:white;background:black}.brand{font-weight:bold}.clock{font-size:18px}
.icons{padding:28px;display:grid;gap:24px;width:120px}.icon{border:0;background:transparent;font:18px VT323;display:grid;gap:5px;place-items:center;cursor:pointer}.icon i{width:42px;height:48px;border:3px solid;background:white;position:relative;box-shadow:5px 5px #000}.icon i:before{content:"";position:absolute;inset:6px;border:2px solid;border-top:9px solid}.icon.selected{color:white;background:#000}
.window{position:absolute;width:min(680px,80vw);min-height:470px;left:50%;top:50%;transform:translate(-50%,-47%);background:white;border:3px solid;box-shadow:9px 9px #000}.titlebar{height:36px;border-bottom:3px solid;background:repeating-linear-gradient(0deg,#000 0 2px,#fff 2px 4px);display:flex;align-items:center;justify-content:space-between;padding:3px}.titlebar b{background:white;padding:0 12px;font-weight:normal}.close{width:27px;height:27px;border:3px solid;background:white;font:22px/16px VT323;cursor:pointer}.content{display:grid;grid-template-columns:170px 1fr;min-height:430px}.sidebar{border-right:3px solid;padding:14px 0}.sidebar b{padding:0 14px;font-size:17px}.sidebar button{display:block;width:100%;text-align:left;border:0;background:white;font:19px VT323;padding:7px 14px}.sidebar button.active,.sidebar button:hover{background:#000;color:#fff}.pane{padding:22px}.pane h1{font-size:54px;line-height:.8;margin:8px 0 20px}.dither{height:120px;border:3px solid;background-image:radial-gradient(#000 1px,transparent 1px);background-size:4px 4px;display:grid;place-items:center}.dither span{background:white;border:3px solid;padding:8px 13px}.fields{margin-top:18px;display:grid;grid-template-columns:1fr auto;gap:10px}.fields input{border:3px solid;font:20px VT323;padding:5px}.fields button{border:3px solid;background:white;font:20px VT323;box-shadow:4px 4px #000;cursor:pointer}.fields button:active{box-shadow:1px 1px;transform:translate(3px,3px)}
.dialog{position:absolute;inset:0;background:#fff8;display:none;place-items:center;z-index:15}.dialog.open{display:grid}.box{width:330px;background:white;border:3px solid;box-shadow:8px 8px #000;padding:22px;text-align:center}.hourglass{font-size:56px;animation:flip 1s steps(2) infinite}.box button{font:20px VT323;border:3px solid;background:white;padding:3px 20px}.hidden{display:none}@keyframes flip{to{transform:rotate(180deg)}}@media(max-width:600px){.window{width:94vw}.content{grid-template-columns:1fr}.sidebar{display:none}.pane h1{font-size:42px}}
</style>
</head>
<body><main class="desktop"><div class="menu"><div><b class="brand">◆ BITMAP</b>　<button>File</button><button>Edit</button><button>View</button></div><span class="clock" id="clock">09:41</span></div><div class="icons"><button class="icon selected"><i></i>UI_KIT</button><button class="icon"><i></i>TRASH</button></div>
<section class="window" id="window"><header class="titlebar" id="drag"><b>BITMAP_OS / CONTROL_PANEL</b><button class="close" id="close">×</button></header><div class="content"><aside class="sidebar"><b>DESK ACCESSORIES</b><button class="active">Appearance</button><button>Patterns</button><button>Sound</button><button>Mouse</button></aside><article class="pane"><h1>One bit.<br>Every decision.</h1><div class="dither"><span>50% ORDERED DITHER</span></div><div class="fields"><input value="Untitled Interface"><button id="save">SAVE AS…</button></div><p>□ Snap windows to pixel grid<br>☒ Use marching ants selection<br>☒ Make everything unmistakable</p></article></div></section>
<div class="dialog" id="dialog"><div class="box"><div class="hourglass">⌛</div><p>SAVING TO FLOPPY…</p><button id="okay">OK</button></div></div></main>
<script>
const win=document.querySelector("#window"),dialog=document.querySelector("#dialog");document.querySelector("#close").onclick=()=>win.classList.toggle("hidden");document.querySelector(".icon").onclick=()=>win.classList.remove("hidden");document.querySelector("#save").onclick=()=>dialog.classList.add("open");document.querySelector("#okay").onclick=()=>dialog.classList.remove("open");setInterval(()=>{document.querySelector("#clock").textContent=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})},1000);
let drag=false,ox=0,oy=0;document.querySelector("#drag").onpointerdown=e=>{drag=true;ox=e.clientX-win.offsetLeft;oy=e.clientY-win.offsetTop;win.style.transform="none"};onpointermove=e=>{if(drag){win.style.left=e.clientX-ox+"px";win.style.top=e.clientY-oy+"px"}};onpointerup=()=>drag=false;
</script></body></html>

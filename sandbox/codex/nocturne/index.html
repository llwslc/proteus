<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>NOCTURNE / A Garden After Dark</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500&family=Montserrat:wght@400;500&display=swap');
:root{--night:#110b13;--wine:#4c1726;--bone:#e9dfd1;--gold:#b28a4c;--leaf:#263c30}*{box-sizing:border-box}
body{margin:0;background:var(--night);color:var(--bone);font-family:Montserrat,sans-serif;min-height:100vh}.garden{min-height:100vh;position:relative;overflow:hidden;background:radial-gradient(circle at 50% 28%,#49233755,transparent 31%),radial-gradient(circle at 20% 80%,#283f3044,transparent 36%),#100a12}
.garden:after{content:"";position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(#b28a4c22 1px,transparent 1px);background-size:29px 29px;mask-image:linear-gradient(90deg,#000,transparent 55%,#000)}
nav{height:74px;position:relative;z-index:8;display:flex;justify-content:space-between;align-items:center;margin:0 4vw;border-bottom:1px solid #b28a4c66;font-size:10px;letter-spacing:4px}nav a{color:inherit;text-decoration:none}
.hero{position:relative;z-index:2;display:grid;grid-template-columns:1fr 1.1fr;max-width:1400px;margin:auto;min-height:760px;align-items:center;padding:4vw}.copy{padding:3vw}.copy small{color:var(--gold);letter-spacing:5px}.copy h1{font:clamp(74px,11vw,155px)/.72 "Cormorant Garamond";letter-spacing:-.06em;margin:28px 0}.copy h1 i{display:block;color:var(--gold);font-weight:500;margin-left:14%}.copy p{max-width:460px;color:#bdb0b2;font:16px/1.8 "Cormorant Garamond";letter-spacing:.02em}.copy button{background:transparent;color:var(--bone);border:1px solid var(--gold);padding:13px 22px;letter-spacing:3px;font:10px Montserrat;cursor:pointer;margin-top:18px}
.portrait{height:650px;position:relative;border:1px solid #b28a4c88;background:linear-gradient(#ffffff08,#0003);box-shadow:inset 0 0 90px #000}.portrait:before{content:"";position:absolute;inset:14px;border:1px solid #b28a4c55}.moon{position:absolute;left:50%;top:13%;width:210px;aspect-ratio:1;border-radius:50%;background:#e9dfd1;box-shadow:0 0 50px #e9dfd166;transform:translateX(-50%)}
.stem{position:absolute;width:8px;height:380px;left:50%;bottom:0;background:linear-gradient(90deg,#17261c,#3f5943,#17261c);transform:rotate(-3deg)}.leaf{position:absolute;width:120px;height:54px;background:var(--leaf);border:1px solid #6a7958;border-radius:100% 0;transform-origin:bottom right}.l1{left:-112px;top:90px;transform:rotate(20deg)}.l2{left:2px;top:170px;transform:rotate(155deg)}.l3{left:-110px;top:250px;transform:rotate(-8deg)}
.flower{position:absolute;left:50%;top:32%;width:260px;aspect-ratio:1;transform:translate(-50%,-50%);transition:1.4s}.petal{position:absolute;left:39%;top:7%;width:22%;height:45%;border-radius:90% 10% 70% 30%;background:linear-gradient(130deg,#76283e,#2b0b18);border:1px solid #a05767;transform-origin:50% 95%;transition:1.4s cubic-bezier(.2,.9,.2,1)}.petal:nth-child(2){transform:rotate(60deg)}.petal:nth-child(3){transform:rotate(120deg)}.petal:nth-child(4){transform:rotate(180deg)}.petal:nth-child(5){transform:rotate(240deg)}.petal:nth-child(6){transform:rotate(300deg)}.heart{position:absolute;left:42%;top:42%;width:16%;aspect-ratio:1;border-radius:50%;background:var(--gold);box-shadow:0 0 20px #d1a352}
.closed .petal{transform:rotate(var(--r,0)) scaleX(.2);filter:brightness(.5)}.closed .petal:nth-child(2){--r:60deg}.closed .petal:nth-child(3){--r:120deg}.closed .petal:nth-child(4){--r:180deg}.closed .petal:nth-child(5){--r:240deg}.closed .petal:nth-child(6){--r:300deg}.specimen{position:absolute;right:26px;bottom:22px;font:italic 15px "Cormorant Garamond";color:var(--gold)}
@media(max-width:800px){.hero{grid-template-columns:1fr;padding-top:60px}.portrait{height:590px}.copy h1{font-size:85px}}
</style>
</head>
<body><main class="garden"><nav><span>NOCTURNE BOTANICAL SOCIETY</span><span>HERBARIUM / MIDNIGHT</span><a href="../">ATLAS ↗</a></nav><section class="hero">
<article class="copy"><small>THE DARK BOTANICAL SYSTEM</small><h1>A garden<i>after dark.</i></h1><p>Velvet surfaces. Brass labels. Components that reveal themselves as patiently as flowers under moonlight.</p><button id="bloom">CLOSE THE BLOOM</button></article>
<div class="portrait"><i class="moon"></i><div class="stem"><i class="leaf l1"></i><i class="leaf l2"></i><i class="leaf l3"></i></div><div class="flower" id="flower"><i class="petal"></i><i class="petal"></i><i class="petal"></i><i class="petal"></i><i class="petal"></i><i class="petal"></i><b class="heart"></b></div><span class="specimen">Rosa tenebris · specimen 09</span></div>
</section></main><script>const flower=document.querySelector("#flower"),button=document.querySelector("#bloom");button.onclick=()=>{flower.classList.toggle("closed");button.textContent=flower.classList.contains("closed")?"OPEN THE BLOOM":"CLOSE THE BLOOM"}</script></body></html>

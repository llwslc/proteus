<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ORMOLU / The Gilded Salon</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Italiana&family=Petit+Formal+Script&family=Spectral:wght@300;500&display=swap');
:root{--ivory:#eee8dc;--sage:#839781;--gold:#ad873d;--rose:#b76f76;--ink:#3b3030}*{box-sizing:border-box}
body{margin:0;background:#c9c1b2;color:var(--ink);font-family:"Spectral",serif}.salon{min-height:100vh;background:linear-gradient(90deg,#748773 0 7%,transparent 7% 93%,#748773 93%),linear-gradient(#f3eee5,#dfd6c8);position:relative;overflow:hidden;padding:22px 8%}.salon:before{content:"";position:absolute;inset:0;opacity:.35;background-image:radial-gradient(ellipse at 50% -20%,#fff 0 18%,transparent 19%),repeating-radial-gradient(ellipse at 50% 0,#ffffff0c 0 10px,#0000000a 11px 12px);pointer-events:none}
.curtain{position:absolute;top:0;bottom:0;width:24%;z-index:7;background:repeating-linear-gradient(90deg,#6b7567 0 12%,#9aaa93 14%,#657262 28%);box-shadow:inset -20px 0 40px #26312655;transition:1.4s cubic-bezier(.6,0,.2,1)}.curtain.left{left:0;border-radius:0 0 90% 0}.curtain.right{right:0;transform:scaleX(-1);border-radius:0 0 90% 0}.revealed .curtain.left{transform:translateX(-75%)}.revealed .curtain.right{transform:translateX(75%) scaleX(-1)}
nav{height:58px;position:relative;z-index:8;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--gold);border-bottom:1px solid var(--gold);font-size:11px;letter-spacing:3px}nav a{color:inherit;text-decoration:none}
.hero{min-height:780px;position:relative;z-index:2;display:grid;place-items:center;text-align:center}.cartouche{width:min(780px,86vw);min-height:560px;display:grid;place-items:center;position:relative;background:radial-gradient(ellipse,#fffdf7 0 55%,#e3d6c2 72%,transparent 73%);filter:drop-shadow(0 22px 30px #665a4b44)}.cartouche:before,.cartouche:after{content:"❦";position:absolute;color:var(--gold);font-size:160px;top:28%;text-shadow:1px 2px #fff}.cartouche:before{left:-30px;transform:rotate(-90deg)}.cartouche:after{right:-30px;transform:rotate(90deg)}
.ring{position:absolute;inset:9%;border:8px double var(--gold);border-radius:50% 50% 46% 46%;box-shadow:inset 0 0 0 4px #fff,inset 0 0 0 5px var(--gold)}.content{position:relative;z-index:2;max-width:550px;padding:70px}.monogram{font:58px "Petit Formal Script";color:var(--rose);margin-bottom:15px}h1{font:clamp(55px,9vw,110px)/.74 "Italiana";letter-spacing:-.05em;margin:0}h1 i{display:block;font:34px "Petit Formal Script";color:var(--gold);margin-top:22px}.content p{font-size:14px;line-height:1.7;margin:28px auto;max-width:400px}
.content button{border:1px solid var(--gold);background:var(--ivory);padding:11px 25px;color:var(--ink);font:11px "Spectral";letter-spacing:3px;cursor:pointer}.content button:hover{background:var(--gold);color:white}.flourish{position:absolute;color:var(--gold);font-size:36px;animation:float 4s ease-in-out infinite}.f1{left:8%;top:20%}.f2{right:10%;bottom:18%;animation-delay:-2s}.swatches{position:absolute;right:2%;top:38%;z-index:8;display:grid;gap:8px}.swatches button{width:30px;aspect-ratio:1;border-radius:50%;border:2px solid white;box-shadow:0 0 0 1px var(--gold);cursor:pointer}.swatches button:nth-child(1){background:#839781}.swatches button:nth-child(2){background:#b76f76}.swatches button:nth-child(3){background:#637c8c}.rose .salon{--sage:#b76f76}.rose .curtain{filter:hue-rotate(290deg)}.blue .curtain{filter:hue-rotate(80deg)}
@keyframes float{50%{transform:translateY(-14px) rotate(8deg)}}@media(max-width:700px){.salon{padding:15px 5%}.cartouche{min-height:600px}.cartouche:before,.cartouche:after{font-size:90px}.content{padding:55px 40px}h1{font-size:60px}.curtain{width:35%}}
</style>
</head>
<body id="body"><main class="salon" id="salon"><i class="curtain left"></i><i class="curtain right"></i>
<nav><span>MAISON ORMOLU · PARIS</span><span>COLLECTION / No. 05</span><a href="../">LE CATALOGUE ↗</a></nav>
<section class="hero"><span class="flourish f1">❧</span><span class="flourish f2">❦</span><div class="cartouche"><i class="ring"></i><article class="content"><div class="monogram">O</div><h1>Elegance,<i>in every state.</i></h1><p>A courtly interface collection of gilded frames, satin transitions, delicate controls and unapologetic ornament.</p><button id="reveal">DRAW THE CURTAINS</button></article></div></section>
<div class="swatches"><button data-tone="sage" aria-label="Sage"></button><button data-tone="rose" aria-label="Rose"></button><button data-tone="blue" aria-label="Blue"></button></div></main>
<script>
const salon=document.querySelector("#salon"),body=document.querySelector("#body");document.querySelector("#reveal").onclick=()=>salon.classList.toggle("revealed");document.querySelectorAll("[data-tone]").forEach(b=>b.onclick=()=>{body.className=b.dataset.tone==="sage"?"":b.dataset.tone});
</script></body></html>

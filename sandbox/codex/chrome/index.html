<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CHROME / Liquid Internet 2.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Nunito:wght@600;800&display=swap');
:root{--sky:#9dcced;--deep:#25345a;--gel:#55bafa;--lime:#c8ff5b;--pink:#ff86cd}*{box-sizing:border-box}
body{margin:0;background:#9bcbe9;color:var(--deep);font-family:Nunito,sans-serif;min-height:100vh}.aero{min-height:100vh;position:relative;overflow:hidden;background:radial-gradient(circle at 15% 12%,#fff 0 1%,transparent 11%),linear-gradient(#83c3ed,#dff6ff 58%,#97d291 59%,#5ba468)}
.cloud{position:absolute;width:330px;height:100px;border-radius:50%;background:#fff9;filter:blur(2px);top:17%;left:-70px;box-shadow:190px 20px 0 #fff8,650px -80px 0 #fff7}.grid{position:absolute;inset:59% 0 0;background:linear-gradient(#fff4 1px,transparent 1px),linear-gradient(90deg,#fff4 1px,transparent 1px);background-size:60px 40px;transform:perspective(350px) rotateX(58deg);transform-origin:top}
nav{position:relative;z-index:7;margin:18px auto;width:min(1300px,94vw);height:65px;border:1px solid #fff;border-radius:999px;background:linear-gradient(#ffffffd9,#a9ddf2b5);box-shadow:inset 0 2px 4px #fff,0 14px 24px #3e729e55;display:flex;align-items:center;justify-content:space-between;padding:0 24px;font-size:11px}nav a{color:inherit;text-decoration:none}.logo{font:22px "Archivo Black";font-style:italic}
.hero{position:relative;z-index:2;min-height:760px;display:grid;grid-template-columns:1fr 1.1fr;align-items:center;max-width:1400px;margin:auto;padding:4vw}.copy small{display:inline-block;background:var(--lime);border:2px solid var(--deep);border-radius:999px;padding:6px 14px;box-shadow:3px 3px 0 var(--deep)}h1{font:clamp(76px,12vw,170px)/.7 "Archivo Black";font-style:italic;letter-spacing:-.1em;margin:35px 0;color:#e6f7ff;-webkit-text-stroke:3px #384a70;text-shadow:0 5px #7e95ac,0 9px #e4fdff,8px 14px 0 #5879ac}h1 span{display:block;margin-left:12%;background:linear-gradient(180deg,#fff,#7d889b 35%,#fff 53%,#66758a 75%,#f9ffff);background-clip:text;color:transparent}.copy p{max-width:450px;line-height:1.7}.gel-btn{border:2px solid #fff;border-radius:99px;background:linear-gradient(#85d7ff,#168bde);color:white;padding:14px 24px;font-weight:800;box-shadow:inset 0 4px 5px #fff9,0 6px 0 #1e5f9f,0 12px 18px #315a8055;cursor:pointer}
.portal{position:relative;height:600px;display:grid;place-items:center}.orb{width:min(38vw,460px);aspect-ratio:1;border-radius:44% 56% 65% 35% / 44% 39% 61% 56%;background:radial-gradient(circle at 32% 22%,#fff 0 5%,#fff0 14%),linear-gradient(135deg,#b6f1ff,#3b95de 35%,#da8cfa 58%,#87ffc9 83%);box-shadow:inset 18px 20px 30px #fff9,inset -28px -30px 45px #195db888,0 28px 50px #27588488;animation:morph 7s ease-in-out infinite;position:relative}.orb:after{content:"CHROME";position:absolute;inset:0;display:grid;place-items:center;font:42px "Archivo Black";font-style:italic;color:white;text-shadow:3px 3px #4b5483}
.player{position:absolute;bottom:24px;width:min(470px,90%);height:105px;border:2px solid white;border-radius:35px;background:linear-gradient(120deg,#ffffffc7,#75b7e5a8);backdrop-filter:blur(12px);box-shadow:inset 0 1px 4px white,0 18px 35px #25466f55;padding:18px;display:grid;grid-template-columns:60px 1fr;gap:15px}.play{border-radius:50%;border:2px solid white;background:linear-gradient(#ffb7df,#d84b9a);color:white;font-size:20px;cursor:pointer}.track b,.track span{display:block;font-size:12px}.track span{font-size:9px}.track input{width:100%;accent-color:var(--pink)}.playing .orb{animation-duration:2.5s;filter:hue-rotate(40deg)}.playing .play{transform:scale(.92)}
@keyframes morph{50%{border-radius:64% 36% 34% 66% / 38% 61% 39% 62%;transform:translateY(-18px) rotate(5deg)}}@media(max-width:800px){.hero{grid-template-columns:1fr}.portal{height:570px}.orb{width:360px}h1{font-size:82px}}
</style>
</head>
<body><main class="aero" id="aero"><i class="cloud"></i><i class="grid"></i><nav><div class="logo">CHROME™</div><span>LIQUID INTERNET / 2.0</span><a href="../">ATLAS ↗</a></nav><section class="hero"><article class="copy"><small>WELCOME BACK TO TOMORROW</small><h1>Stay<span>fluid.</span></h1><p>Mirror-bright typography, gel controls and optimistic blue-sky surfaces from the internet future we were promised.</p><button class="gel-btn" id="enter">ENTER THE PORTAL →</button></article><div class="portal"><div class="orb"></div><div class="player"><button class="play" id="play">▶</button><div class="track"><b>CYBER DAYDREAM_02.wav</b><span>02:16 / 04:32</span><input type="range" value="48"></div></div></div></section></main>
<script>const aero=document.querySelector("#aero");function toggle(){aero.classList.toggle("playing");document.querySelector("#play").textContent=aero.classList.contains("playing")?"Ⅱ":"▶"}document.querySelector("#play").onclick=toggle;document.querySelector("#enter").onclick=toggle</script></body></html>

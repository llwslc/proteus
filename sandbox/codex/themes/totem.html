<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-signature" content="interactive-loom,motif-stamps,dye-bowls,rhythm-sequencer,wood-shuttle,pattern-wheel">
  <title>TOTEM — 民艺织纹机</title>
  <style>
    :root{--ochre:#b8642b;--indigo:#173c55;--bone:#e9dfbd;--vermilion:#a93424;--wood:#5c321f;--dye:#173c55;--tempo:1.2s}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#b95d2f;color:#281b13;font-family:Trebuchet MS,"Noto Sans SC",sans-serif}
    button,input{font:inherit;color:inherit}button{cursor:pointer}
    body{background-image:repeating-linear-gradient(0deg,#00000012 0 2px,transparent 2px 8px),linear-gradient(110deg,#aa5029,#d0833a)}
    .workshop{display:grid;grid-template-columns:270px minmax(520px,1fr);min-height:100vh}
    .tool-wall{padding:22px;border-right:8px solid var(--wood);background:var(--bone);box-shadow:inset -12px 0 #d0bd8a}
    .brand{display:grid;grid-template-columns:58px 1fr;gap:13px;align-items:center;padding-bottom:18px;border-bottom:5px solid var(--wood)}
    .brand-mark{display:grid;place-items:center;width:58px;height:58px;background:var(--indigo);color:var(--bone);font:900 27px Georgia,serif;clip-path:polygon(50% 0,95% 25%,95% 75%,50% 100%,5% 75%,5% 25%)}
    .brand h1{margin:0;font:900 22px Georgia,serif;text-transform:uppercase}.brand p{margin:5px 0 0;font-size:9px;letter-spacing:.16em}
    .tool-title{display:flex;justify-content:space-between;margin:24px 0 10px;font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}.tool-title span{color:#756145}
    .motifs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.motif{aspect-ratio:1;border:3px solid var(--wood);background:#d9c897;display:grid;place-items:center}.motif.active{background:var(--indigo);color:var(--bone);box-shadow:4px 4px 0 var(--ochre)}
    .glyph{width:36px;height:36px;background:currentColor;clip-path:var(--shape)}.diamond{--shape:polygon(50% 0,100% 50%,50% 100%,0 50%,50% 68%,68% 50%,50% 32%,32% 50%)}.bird{--shape:polygon(0 44%,34% 20%,50% 43%,66% 20%,100% 44%,66% 55%,66% 90%,50% 68%,34% 90%,34% 55%)}.sun{--shape:polygon(50% 0,61% 30%,85% 15%,70% 39%,100% 50%,70% 61%,85% 85%,61% 70%,50% 100%,39% 70%,15% 85%,30% 61%,0 50%,30% 39%,15% 15%,39% 30%)}
    .dye-bowls{display:flex;gap:12px}.dye{position:relative;width:62px;height:48px;border:3px solid var(--wood);border-radius:50%;background:var(--color);box-shadow:inset 0 7px 0 #fff3,0 5px 0 var(--wood)}.dye.active:after{position:absolute;inset:-8px;border:3px dashed var(--wood);border-radius:50%;content:""}
    .wheel-wrap{display:grid;grid-template-columns:100px 1fr;gap:14px;align-items:center}.pattern-wheel{position:relative;width:96px;height:96px;border:6px solid var(--wood);border-radius:50%;background:conic-gradient(var(--indigo) 0 45deg,var(--bone) 45deg 90deg,var(--ochre) 90deg 135deg,var(--bone) 135deg 180deg,var(--vermilion) 180deg 225deg,var(--bone) 225deg 270deg,var(--indigo) 270deg 315deg,var(--bone) 315deg);transition:transform .5s}
    .pattern-wheel:after{position:absolute;inset:29px;border:6px solid var(--wood);border-radius:50%;background:var(--bone);content:""}.wheel-buttons{display:grid;gap:7px}.wheel-buttons button{padding:8px;border:2px solid var(--wood);background:transparent;font-size:9px;font-weight:bold}.wheel-buttons button:hover{background:var(--ochre);color:white}
    .loom-stage{position:relative;display:grid;place-items:center;min-height:100vh;padding:28px;background:radial-gradient(circle,#db9a4a,#a64d28 75%)}
    .loom{position:relative;width:min(820px,92%);padding:52px 58px 82px;border:28px solid var(--wood);border-left-width:42px;border-right-width:42px;background:#8c4d2d;box-shadow:inset 0 0 0 7px #2c1c13,18px 26px 0 #71381f}
    .loom:before,.loom:after{position:absolute;left:-70px;right:-70px;height:34px;border:7px solid #2b1b12;border-radius:18px;background:linear-gradient(#805133,#4a2c1d);content:""}.loom:before{top:-58px}.loom:after{bottom:-58px}
    .warp{position:relative;padding:14px;background:var(--bone);box-shadow:inset 0 0 0 5px var(--indigo)}
    .warp:before{position:absolute;inset:0;pointer-events:none;content:"";background:repeating-linear-gradient(90deg,transparent 0 calc(8.333% - 1px),#63452b55 calc(8.333% - 1px) 8.333%);z-index:3}
    .woven-grid{display:grid;grid-template-columns:repeat(12,1fr);aspect-ratio:12/8;border:2px solid var(--wood);background:#d7c795}
    .thread{position:relative;border:1px solid #72533630;background:var(--cell,#e9dfbd);transition:transform .12s,background .2s}.thread:hover{z-index:4;outline:3px solid #fff;transform:scale(1.12)}.thread:after{position:absolute;inset:16%;background:currentColor;content:"";clip-path:var(--stamp,polygon(0 45%,100% 45%,100% 55%,0 55%));opacity:var(--marked,0)}.thread.marked{--marked:1;color:var(--dye)}
    .border-band{height:28px;background:repeating-linear-gradient(45deg,var(--indigo) 0 14px,var(--bone) 14px 28px,var(--vermilion) 28px 42px,var(--bone) 42px 56px);border:2px solid var(--wood)}.border-band.top{margin-bottom:7px}.border-band.bottom{margin-top:7px;transform:scaleX(-1)}.border-band.bottom.unmirrored{transform:none}
    .shuttle{position:absolute;z-index:5;left:8%;bottom:30px;width:190px;height:34px;border:4px solid #2a180f;border-radius:70% 12px 70% 12px;background:linear-gradient(#c18043,#704324);box-shadow:6px 7px 0 #3f2618;animation:weave var(--tempo) steps(4) infinite alternate}.shuttle:after{position:absolute;left:50%;top:50%;width:74px;height:12px;border-radius:10px;background:var(--dye);content:"";transform:translate(-50%,-50%)}
    @keyframes weave{to{left:calc(92% - 190px)}}
    .counter{position:absolute;right:26px;top:20px;padding:9px 13px;border:4px solid var(--wood);background:var(--bone);font:900 12px ui-monospace,monospace;transform:rotate(1deg)}
    .rhythm-board{position:absolute;left:50%;bottom:18px;width:min(620px,75%);padding:10px 14px;border:5px solid var(--wood);background:var(--bone);transform:translateX(-50%);box-shadow:7px 7px 0 #71361f}
    .rhythm-head{display:flex;justify-content:space-between;margin-bottom:7px;font-size:9px;font-weight:bold;letter-spacing:.12em}.steps{display:grid;grid-template-columns:repeat(8,1fr);gap:6px}.step{height:28px;border:2px solid var(--wood);background:#d2bf87;font-weight:bold}.step.on{background:var(--vermilion);color:white}.step.play{outline:3px solid var(--indigo);outline-offset:2px}
    .speed{display:flex;align-items:center;gap:10px;margin-top:16px}.speed input{flex:1;accent-color:var(--vermilion)}.speed span{font:9px ui-monospace,monospace}
    @media(max-width:900px){.workshop{grid-template-columns:230px 1fr}.loom{width:96%;padding:40px 30px 70px;border-width:22px 28px}.rhythm-board{width:85%}}
    @media(max-width:650px){.workshop{display:block}.tool-wall{border:0;border-bottom:8px solid var(--wood)}.loom-stage{min-height:720px;padding:10px}.loom{padding:30px 15px 72px;border-width:18px 20px}.rhythm-board{width:92%}.thread:hover{transform:none}.shuttle{width:125px}@keyframes weave{to{left:calc(92% - 125px)}}}
  </style>
</head>
<body>
  <main class="workshop">
    <aside class="tool-wall">
      <header class="brand"><div class="brand-mark">ᚲ</div><div><h1>Totem Loom</h1><p>FOLK PATTERN WORKSHOP</p></div></header>

      <div class="tool-title"><b>刻版纹样</b><span>01 / 03</span></div>
      <div class="motifs" id="motifs">
        <button class="motif active" data-shape="polygon(50% 0,100% 50%,50% 100%,0 50%,50% 68%,68% 50%,50% 32%,32% 50%)"><i class="glyph diamond"></i></button>
        <button class="motif" data-shape="polygon(0 44%,34% 20%,50% 43%,66% 20%,100% 44%,66% 55%,66% 90%,50% 68%,34% 90%,34% 55%)"><i class="glyph bird"></i></button>
        <button class="motif" data-shape="polygon(50% 0,61% 30%,85% 15%,70% 39%,100% 50%,70% 61%,85% 85%,61% 70%,50% 100%,39% 70%,15% 85%,30% 61%,0 50%,30% 39%,15% 15%,39% 30%)"><i class="glyph sun"></i></button>
      </div>

      <div class="tool-title"><b>染缸</b><span>选一色</span></div>
      <div class="dye-bowls" id="dyes">
        <button class="dye active" style="--color:#173c55" data-color="#173c55" aria-label="靛蓝"></button>
        <button class="dye" style="--color:#a93424" data-color="#a93424" aria-label="朱砂"></button>
        <button class="dye" style="--color:#b8642b" data-color="#b8642b" aria-label="赭石"></button>
      </div>

      <div class="tool-title"><b>边饰转轮</b><span>旋转</span></div>
      <div class="wheel-wrap">
        <div class="pattern-wheel" id="patternWheel"></div>
        <div class="wheel-buttons"><button data-turn="-45">逆一格</button><button data-turn="45">顺一格</button><button id="mirrorBand">镜像边饰</button></div>
      </div>

      <div class="tool-title"><b>梭速</b><span id="speedOut">中速</span></div>
      <label class="speed"><span>慢</span><input id="speed" type="range" min="5" max="22" value="12"><span>快</span></label>
    </aside>

    <section class="loom-stage">
      <div class="counter">已织 <output id="wovenCount">00</output> 格</div>
      <div class="loom">
        <div class="warp">
          <div class="border-band top" id="topBand"></div>
          <div class="woven-grid" id="wovenGrid" aria-label="可点击的织纹网格"></div>
          <div class="border-band bottom" id="bottomBand"></div>
        </div>
        <div class="shuttle" id="shuttle"></div>
      </div>

      <div class="rhythm-board">
        <div class="rhythm-head"><span>踏板节奏 / PEDAL RHYTHM</span><span id="beatOut">1—3—5—7</span></div>
        <div class="steps" id="steps">
          <button class="step on">1</button><button class="step">2</button><button class="step on">3</button><button class="step">4</button>
          <button class="step on">5</button><button class="step">6</button><button class="step on">7</button><button class="step">8</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const grid=document.querySelector("#wovenGrid");let shape=document.querySelector(".motif.active").dataset.shape,dye="#173c55",count=0;
    for(let i=0;i<96;i++){const cell=document.createElement("button");cell.className="thread";cell.setAttribute("aria-label","织格 "+(i+1));cell.onclick=()=>{cell.classList.toggle("marked");cell.style.setProperty("--stamp",shape);cell.style.setProperty("--dye",dye);count=document.querySelectorAll(".thread.marked").length;document.querySelector("#wovenCount").value=String(count).padStart(2,"0")};grid.appendChild(cell)}
    document.querySelectorAll(".motif").forEach(b=>b.onclick=()=>{shape=b.dataset.shape;document.querySelectorAll(".motif").forEach(x=>x.classList.toggle("active",x===b))});
    document.querySelectorAll(".dye").forEach(b=>b.onclick=()=>{dye=b.dataset.color;document.documentElement.style.setProperty("--dye",dye);document.querySelectorAll(".dye").forEach(x=>x.classList.toggle("active",x===b))});
    let turn=0;document.querySelectorAll("[data-turn]").forEach(b=>b.onclick=()=>{turn+=+b.dataset.turn;document.querySelector("#patternWheel").style.transform=`rotate(${turn}deg)`});
    document.querySelector("#mirrorBand").onclick=()=>document.querySelector("#bottomBand").classList.toggle("unmirrored");
    document.querySelectorAll(".step").forEach(b=>b.onclick=()=>{b.classList.toggle("on");document.querySelector("#beatOut").textContent=[...document.querySelectorAll(".step.on")].map(x=>x.textContent).join("—")||"休止"});
    const speed=document.querySelector("#speed");speed.oninput=()=>{const seconds=(2.7-speed.value/10).toFixed(1);document.documentElement.style.setProperty("--tempo",seconds+"s");document.querySelector("#speedOut").textContent=speed.value<10?"慢速":speed.value>17?"疾速":"中速"};
    let beat=0;setInterval(()=>{const all=[...document.querySelectorAll(".step")];all.forEach(x=>x.classList.remove("play"));all[beat++%8].classList.add("play")},450);
  </script>
</body>
</html>

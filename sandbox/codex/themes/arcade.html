<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-signature" content="playable-maze,joystick,d-pad,coin-slot,cartridge-selector,hi-score,segmented-health">
  <title>ARCADE — Pocket Cabinet</title>
  <style>
    :root{--cab:#17191d;--cyan:#26e8ff;--red:#ff3158;--yellow:#ffe34b;--blue:#4f74ff;--pixel:4px}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#06070a;color:white;font-family:"Courier New",monospace}
    button{font:inherit;color:inherit;cursor:pointer}
    body{background-image:linear-gradient(#111722 1px,transparent 1px),linear-gradient(90deg,#111722 1px,transparent 1px);background-size:28px 28px}
    .arcade-room{display:grid;grid-template-columns:250px minmax(520px,1fr) 250px;min-height:100vh;padding:22px;gap:22px}
    .sideboard{align-self:center;border:4px solid #343a47;background:#0e1117;box-shadow:8px 8px 0 #000;padding:18px}
    .pixel-title{margin:0;color:var(--yellow);font-size:19px;line-height:1;text-shadow:3px 0 var(--red);text-transform:uppercase}.tiny{color:#8994a8;font-size:8px;letter-spacing:.13em}
    .cartridges{display:grid;gap:10px;margin:18px 0}.cart{display:grid;grid-template-columns:30px 1fr auto;gap:9px;align-items:center;padding:9px;border:3px solid #373e4d;background:#171c25;text-align:left}.cart:before{display:grid;place-items:center;width:28px;height:28px;background:var(--c);color:#090a0d;content:attr(data-icon);font-weight:bold}.cart strong{font-size:10px}.cart small{display:block;color:#778397;font-size:7px}.cart.active{border-color:var(--c);box-shadow:3px 3px 0 var(--c)}.cart .cursor{opacity:0}.cart.active .cursor{opacity:1;color:var(--c)}
    .score-table{width:100%;border-collapse:collapse;margin-top:18px;font-size:9px}.score-table caption{padding:8px;border:2px solid var(--yellow);color:var(--yellow);font-weight:bold}.score-table td{padding:7px 3px;border-bottom:1px dashed #3e4655}.score-table td:last-child{text-align:right;color:var(--cyan)}
    .cabinet{position:relative;align-self:center;max-width:710px;width:100%;margin:auto;padding:32px 48px 155px;border:9px solid #343842;border-radius:16px 16px 60px 60px;background:linear-gradient(90deg,#111318,#2b2f38 12%,#111319 50%,#292d35 88%,#101217);box-shadow:0 0 0 5px #090a0c,18px 28px 0 #000}
    .marquee{position:relative;margin:-22px -22px 22px;padding:18px 12px;border:5px solid #07080a;background:var(--red);text-align:center;box-shadow:inset 0 0 0 5px var(--yellow),0 7px 0 #08090b;clip-path:polygon(3% 0,97% 0,100% 100%,0 100%)}
    .marquee h1{margin:0;font-size:clamp(24px,5vw,47px);line-height:.8;letter-spacing:-.08em;text-shadow:4px 4px 0 #1a2367}.marquee span{font-size:8px;letter-spacing:.35em}
    .screen-bezel{position:relative;padding:25px;border:10px solid #090a0d;border-radius:18% 18% 12% 12%;background:#292d34;box-shadow:inset 0 0 22px #000}
    .screen{position:relative;aspect-ratio:15/11;overflow:hidden;border:6px solid #08090b;border-radius:7%;background:#02030a;box-shadow:inset 0 0 35px #000,0 0 10px var(--cyan)}
    .screen:after{position:absolute;z-index:8;inset:0;pointer-events:none;content:"";background:repeating-linear-gradient(0deg,transparent 0 3px,#0007 4px 5px),radial-gradient(ellipse,transparent 50%,#000b);mix-blend-mode:multiply}
    .hud{position:absolute;z-index:6;left:5%;right:5%;top:4%;display:flex;justify-content:space-between;color:var(--yellow);font-size:clamp(7px,1.2vw,11px);text-shadow:0 0 5px currentColor}.hud output{color:white}
    .maze{position:absolute;left:7%;right:7%;top:17%;bottom:8%;display:grid;grid-template-columns:repeat(15,1fr);grid-template-rows:repeat(11,1fr)}.cell{position:relative}.cell.wall{background:var(--blue);box-shadow:inset 2px 2px 0 var(--cyan),inset -2px -2px 0 #1c2c8c}.cell.dot:after{position:absolute;left:50%;top:50%;width:4px;height:4px;background:var(--yellow);content:"";transform:translate(-50%,-50%);box-shadow:0 0 5px var(--yellow)}.cell.power:after{width:10px;height:10px}
    .player-sprite,.ghost{position:absolute;z-index:5;left:calc((var(--x) + .1)*100%/15);top:calc((var(--y) + .1)*100%/11);width:calc(80%/15);height:calc(80%/11);transition:left .08s steps(2),top .08s steps(2)}.player-sprite{background:var(--yellow);clip-path:polygon(0 0,100% 0,100% 35%,58% 50%,100% 68%,100% 100%,0 100%)}.ghost{--x:13;--y:9;background:var(--red);clip-path:polygon(20% 0,80% 0,100% 30%,100% 100%,75% 75%,50% 100%,25% 75%,0 100%,0 30%)}.ghost:after{position:absolute;left:22%;top:28%;width:16%;height:22%;background:white;box-shadow:220% 0 white;content:""}
    .start-overlay{position:absolute;z-index:7;inset:0;display:grid;place-items:center;background:#02030aba}.start-overlay.hide{display:none}.start-overlay button{padding:12px 18px;border:4px solid var(--yellow);background:#090c15;color:var(--yellow);font-weight:bold;animation:blink .8s steps(1) infinite}@keyframes blink{50%{opacity:.25}}
    .control-deck{position:absolute;left:-14px;right:-14px;bottom:-35px;height:175px;border:7px solid #090a0c;background:linear-gradient(#373c46,#15171c);clip-path:polygon(4% 0,96% 0,100% 72%,91% 100%,9% 100%,0 72%);box-shadow:0 13px 0 #08090a}
    .joystick{position:absolute;left:15%;top:38px;width:90px;height:90px}.stick{position:absolute;z-index:2;left:34px;top:-22px;width:22px;height:67px;background:#aeb3bd;transform-origin:50% 100%;transition:.1s}.stick:before{position:absolute;left:-15px;top:-20px;width:52px;height:52px;border:5px solid #571025;border-radius:50%;background:var(--red);content:"";box-shadow:inset 5px 5px 0 #ff728c}.stick:after{position:absolute;left:-22px;bottom:-13px;width:66px;height:25px;border-radius:50%;background:#090a0d;content:""}.joy-pad{position:absolute;inset:0;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);z-index:4}.joy-pad button{border:0;background:transparent}.joy-pad .up{grid-column:2}.joy-pad .left{grid-column:1;grid-row:2}.joy-pad .right{grid-column:3;grid-row:2}.joy-pad .down{grid-column:2;grid-row:3}
    .action-buttons{position:absolute;right:14%;top:45px;display:flex;gap:18px}.action{width:58px;height:58px;border:6px solid #0b0c0f;border-radius:50%;background:var(--c);box-shadow:inset 5px 5px 0 #ffffff55,0 8px 0 #08090b;font-weight:bold}.action:active{transform:translateY(7px);box-shadow:inset 3px 3px 0 #ffffff44,0 1px 0 #08090b}
    .coin-slot{position:absolute;left:50%;bottom:14px;padding:6px 18px;border:4px solid #08090b;background:#252a31;color:#ffb83e;transform:translateX(-50%);font-size:8px;box-shadow:inset 0 0 0 2px #59616e}.coin-slot:before{display:inline-block;width:6px;height:18px;margin-right:8px;background:#08090b;vertical-align:middle;content:""}.coin-slot.ready{box-shadow:0 0 13px var(--yellow),inset 0 0 0 2px #ffb83e}
    .inventory{margin-top:20px}.health{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}.health i{height:14px;background:var(--red);box-shadow:inset 2px 2px #ff8da2}.health i.off{background:#303642;box-shadow:none}.powerups{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px}.power{padding:10px 3px;border:3px solid #39414f;background:#171b23;text-align:center}.power b{display:block;color:var(--c);font-size:21px}.power span{font-size:7px}.power.active{border-color:var(--c);box-shadow:0 0 8px var(--c)}
    .instructions{margin-top:20px;padding:12px;border:1px dashed #4b5465;color:#7f8b9d;font-size:9px;line-height:1.6}.instructions kbd{padding:2px 5px;border:1px solid #667083;background:#252a33;color:white}
    @media(max-width:1050px){.arcade-room{grid-template-columns:210px 1fr}.sideboard:last-child{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:20px}.sideboard:last-child .pixel-title,.sideboard:last-child .instructions{grid-column:1/-1}}
    @media(max-width:700px){.arcade-room{display:block;padding:8px}.sideboard{margin:12px 0}.cabinet{padding:24px 22px 140px;margin:20px auto;width:92%;box-shadow:8px 13px 0 #000}.screen-bezel{padding:13px}.control-deck{height:150px}.joystick{transform:scale(.75);left:9%}.action-buttons{transform:scale(.78);right:6%}.sideboard:last-child{display:block}}
  </style>
</head>
<body>
  <main class="arcade-room">
    <aside class="sideboard">
      <div class="tiny">CABINET ROM SELECT / A-01</div><h2 class="pixel-title">Choose Game</h2>
      <div class="cartridges" id="cartridges">
        <button class="cart active" style="--c:#ff3158" data-icon="♥" data-title="DOT RAIDERS" data-color="#ff3158"><span><strong>DOT RAIDERS</strong><small>MAZE / 1 PLAYER</small></span><b class="cursor">▶</b></button>
        <button class="cart" style="--c:#26e8ff" data-icon="◆" data-title="CYAN DRIFT" data-color="#26e8ff"><span><strong>CYAN DRIFT</strong><small>RACE / 2 PLAYER</small></span><b class="cursor">▶</b></button>
        <button class="cart" style="--c:#ffe34b" data-icon="✦" data-title="BLOCK MOON" data-color="#ffe34b"><span><strong>BLOCK MOON</strong><small>PUZZLE / ENDLESS</small></span><b class="cursor">▶</b></button>
      </div>
      <table class="score-table"><caption>★ HI-SCORE ★</caption><tr><td>AAA</td><td>082400</td></tr><tr><td>KIT</td><td>061280</td></tr><tr><td>CPU</td><td>040000</td></tr><tr><td>YOU</td><td id="tableScore">000000</td></tr></table>
    </aside>

    <section class="cabinet">
      <header class="marquee"><span>8-BIT VIDEO SYSTEM</span><h1 id="gameTitle">DOT RAIDERS</h1></header>
      <div class="screen-bezel">
        <div class="screen">
          <div class="hud"><span>1UP <output id="score">000000</output></span><span>ROUND 01</span><span>DOTS <output id="dots">00</output></span></div>
          <div class="maze" id="maze"><i class="player-sprite" id="playerSprite" style="--x:1;--y:1"></i><i class="ghost"></i></div>
          <div class="start-overlay" id="startOverlay"><button id="start">INSERT COIN / PRESS START</button></div>
        </div>
      </div>
      <div class="control-deck">
        <div class="joystick"><i class="stick" id="stick"></i><div class="joy-pad"><button class="up" data-dir="up" aria-label="上"></button><button class="left" data-dir="left" aria-label="左"></button><button class="right" data-dir="right" aria-label="右"></button><button class="down" data-dir="down" aria-label="下"></button></div></div>
        <div class="action-buttons"><button class="action" style="--c:#ff3158">A</button><button class="action" style="--c:#ffe34b">B</button></div>
        <button class="coin-slot" id="coin">INSERT 25¢</button>
      </div>
    </section>

    <aside class="sideboard">
      <div class="tiny">PLAYER LOADOUT / P1</div><h2 class="pixel-title">Power Rack</h2>
      <div class="inventory"><div class="health" id="health"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div><div class="powerups"><button class="power active" style="--c:#26e8ff"><b>⚡</b><span>TURBO</span></button><button class="power" style="--c:#ff3158"><b>♥</b><span>EXTRA</span></button><button class="power" style="--c:#ffe34b"><b>★</b><span>GHOST</span></button></div></div>
      <div class="instructions">投币后使用 <kbd>←</kbd> <kbd>↑</kbd> <kbd>↓</kbd> <kbd>→</kbd> 或摇杆吃完点阵。A 键补充生命格。</div>
    </aside>
  </main>

  <script>
    const map=["###############","#.............#","#.###.###.###.#","#o#.........#o#","#.#.##.#.##.#.#","#...#.....#...#","###.#.###.#.###","#.....#.#.....#","#.###.#.#.###.#","#.............#","###############"];
    const maze=document.querySelector("#maze"),playerSprite=document.querySelector("#playerSprite");let px=1,py=1,score=0,running=false,coin=false;
    map.forEach((row,y)=>[...row].forEach((v,x)=>{const c=document.createElement("span");c.className="cell "+(v==="#"?"wall":v==="o"?"dot power":v==="."?"dot":"");c.dataset.x=x;c.dataset.y=y;maze.appendChild(c)}));
    function move(dir){if(!running)return;let nx=px,ny=py;if(dir==="left")nx--;if(dir==="right")nx++;if(dir==="up")ny--;if(dir==="down")ny++;if(map[ny][nx]==="#")return;px=nx;py=ny;playerSprite.style.setProperty("--x",px);playerSprite.style.setProperty("--y",py);const cell=document.querySelector(`.cell[data-x="${px}"][data-y="${py}"]`);if(cell.classList.contains("dot")){cell.classList.remove("dot","power");score+=100;document.querySelector("#score").value=String(score).padStart(6,"0");document.querySelector("#tableScore").textContent=String(score).padStart(6,"0");document.querySelector("#dots").value=String(document.querySelectorAll(".cell.dot").length).padStart(2,"0")}}
    document.querySelectorAll("[data-dir]").forEach(b=>b.onclick=()=>{move(b.dataset.dir);const rot={up:0,right:18,down:0,left:-18}[b.dataset.dir];document.querySelector("#stick").style.transform=`rotate(${rot}deg)`;setTimeout(()=>document.querySelector("#stick").style.transform="",120)});
    addEventListener("keydown",e=>{const d={ArrowLeft:"left",ArrowRight:"right",ArrowUp:"up",ArrowDown:"down"}[e.key];if(d){e.preventDefault();move(d)}});
    document.querySelector("#coin").onclick=e=>{coin=true;e.currentTarget.classList.add("ready");e.currentTarget.textContent="CREDIT 1"};
    document.querySelector("#start").onclick=()=>{if(!coin){document.querySelector("#coin").animate([{transform:"translateX(-50%)"},{transform:"translateX(-55%)"},{transform:"translateX(-45%)"},{transform:"translateX(-50%)"}],{duration:250});return}running=true;document.querySelector("#startOverlay").classList.add("hide")};
    document.querySelectorAll(".action").forEach((b,i)=>b.onclick=()=>{if(i===0){const off=document.querySelector(".health i.off");if(off)off.classList.remove("off")}else document.querySelector("#startOverlay").classList.toggle("hide")});
    document.querySelectorAll(".health i").forEach(h=>h.onclick=()=>h.classList.toggle("off"));document.querySelectorAll(".power").forEach(p=>p.onclick=()=>p.classList.toggle("active"));
    document.querySelectorAll(".cart").forEach(c=>c.onclick=()=>{document.querySelectorAll(".cart").forEach(x=>x.classList.toggle("active",x===c));document.querySelector("#gameTitle").textContent=c.dataset.title;document.documentElement.style.setProperty("--red",c.dataset.color)});
    document.querySelector("#dots").value=String(document.querySelectorAll(".cell.dot").length).padStart(2,"0");
  </script>
</body>
</html>

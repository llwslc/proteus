<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-signature" content="moon-clock,bloom-phase-wheel,scent-vials,iris-aperture,herbarium-specimen">
  <title>NOCTURNE — 夜花培育室</title>
  <style>
    :root{--night:#120c16;--wine:#552031;--brass:#b8995a;--bone:#e8dfce;--leaf:#33463c;--glow:.42}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--night);color:var(--bone);font-family:Georgia,"Songti SC",serif}
    button,input{font:inherit;color:inherit}button{cursor:pointer}
    body{background-image:radial-gradient(circle at 50% 0,#4a20365e,transparent 38%),linear-gradient(#0002,#0008),repeating-radial-gradient(ellipse at 0 50%,transparent 0 34px,#74394a12 35px 36px)}
    .conservatory{display:grid;grid-template-columns:310px minmax(480px,1fr) 310px;min-height:100vh;border:12px solid #09070a}
    .rail{position:relative;padding:26px 24px;background:#1a121b;border:1px solid #6f5a35;overflow:hidden}
    .rail:after{position:absolute;inset:8px;border:1px solid #6f5a3544;pointer-events:none;content:""}
    .kicker{color:var(--brass);font:9px ui-monospace,monospace;letter-spacing:.2em}.rail h2{margin:10px 0 5px;font-weight:400;font-size:23px}.rail>p{margin:0;color:#a99c94;font-size:11px;line-height:1.55}
    .moon-clock{position:relative;width:220px;height:220px;margin:28px auto;border:1px solid #8b7449;border-radius:50%;background:radial-gradient(circle,#2d2230 0 30%,#130d16 31% 49%,#3b28342e 50% 68%,transparent 69%)}
    .moon-clock:before,.moon-clock:after{position:absolute;left:50%;top:50%;content:"";transform:translate(-50%,-50%)}.moon-clock:before{width:1px;height:92%;background:#725d3b}.moon-clock:after{width:92%;height:1px;background:#725d3b}
    .moon{position:absolute;z-index:2;left:50%;top:50%;display:grid;place-items:center;width:70px;height:70px;border-radius:50%;background:var(--bone);box-shadow:0 0 35px #e5cfae55;transform:translate(-50%,-50%);overflow:hidden}
    .moon:after{position:absolute;left:var(--phase,55%);top:-8%;width:95%;height:116%;border-radius:50%;background:#251725;content:"";transition:left .5s}
    .hour{position:absolute;z-index:3;left:50%;top:50%;width:25px;height:25px;padding:0;border:1px solid #796442;border-radius:50%;background:#171018;color:#ad996e;font:8px ui-monospace,monospace;transform:translate(-50%,-50%) rotate(calc(var(--i)*45deg)) translateY(-96px) rotate(calc(var(--i)*-45deg))}
    .hour.active{background:var(--brass);color:#171018;box-shadow:0 0 14px #d9b97566}
    .time-readout{text-align:center;color:#d5bc83;font-style:italic}
    .vials{display:flex;justify-content:center;align-items:flex-end;gap:18px;height:210px;margin-top:22px}
    .vial{position:relative;width:48px;height:160px;border:1px solid #9d8968;border-radius:6px 6px 22px 22px;background:linear-gradient(to top,var(--liquid) 0 var(--level),#ffffff08 var(--level));box-shadow:inset 7px 0 10px #fff1}
    .vial:before{position:absolute;left:8px;right:8px;top:-18px;height:20px;border:1px solid #9d8968;background:#201720;content:""}.vial span{position:absolute;left:50%;bottom:-29px;font-size:9px;white-space:nowrap;transform:translateX(-50%)}
    .vial input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:ns-resize;writing-mode:vertical-lr;direction:rtl}
    .stage{position:relative;display:grid;place-items:center;min-height:100vh;overflow:hidden;background:radial-gradient(circle at 50% 48%,#6c304a2e,transparent 38%)}
    .stage:before{position:absolute;inset:0;content:"";opacity:.3;background-image:radial-gradient(ellipse at 10% 20%,transparent 0 44px,#392630 46px 47px,transparent 49px),radial-gradient(ellipse at 90% 80%,transparent 0 54px,#392630 56px 57px,transparent 59px)}
    .specimen{position:relative;width:min(580px,82%);height:690px;border:1px solid #8b7449;background:linear-gradient(110deg,#241824,#140e16);box-shadow:0 40px 90px #000}
    .specimen:before{position:absolute;inset:12px;border:1px solid #5c472b;content:""}.specimen:after{position:absolute;inset:26px;border:1px solid #4f3c27;content:""}
    .plate-head{position:absolute;z-index:3;top:42px;left:48px;right:48px;display:flex;justify-content:space-between;border-bottom:1px solid #6e5735;padding-bottom:13px}.plate-head strong{font-weight:400;font-style:italic;font-size:18px}.plate-head span{color:#9e8c71;font:9px ui-monospace,monospace;letter-spacing:.14em}
    .botanical{position:absolute;left:50%;bottom:80px;width:340px;height:500px;transform:translateX(-50%)}
    .stem{position:absolute;left:50%;bottom:0;width:4px;height:340px;border-radius:50%;background:linear-gradient(#758268,#29392f);transform:rotate(5deg)}
    .leaf{position:absolute;width:120px;height:54px;border:1px solid #738066;border-radius:100% 0 100% 0;background:linear-gradient(25deg,#18271f,#455b49);transform-origin:100% 50%;filter:drop-shadow(0 8px 8px #000)}
    .leaf:after{position:absolute;left:9%;top:50%;width:82%;height:1px;background:#849077;content:""}.leaf.l1{left:55px;bottom:120px;transform:rotate(19deg)}.leaf.l2{right:57px;bottom:205px;transform:scaleX(-1) rotate(8deg)}.leaf.l3{left:72px;bottom:265px;transform:scale(.78) rotate(-3deg)}
    .flower{position:absolute;left:50%;top:42px;width:210px;height:210px;transform:translateX(-50%);transition:transform 1s}
    .petal{position:absolute;left:72px;top:1px;width:68px;height:110px;border:1px solid #8d5368;border-radius:52% 48% 20% 80%;background:radial-gradient(ellipse at 50% 85%,#76344d,#321624 70%);transform-origin:34px 104px;transform:rotate(calc(var(--i)*45deg)) scaleY(var(--bloom,.52));transition:transform 1.1s cubic-bezier(.3,.8,.1,1);box-shadow:0 0 calc(28px * var(--glow)) #b8587a}
    .flower-core{position:absolute;z-index:4;left:78px;top:91px;width:56px;height:56px;border-radius:50%;background:radial-gradient(circle,#e5c888 0 8%,#9e7542 10% 35%,#4d2532 38%);box-shadow:0 0 24px #e9bb6966}
    .specimen-note{position:absolute;left:48px;bottom:38px;color:#ab9d8e;font-size:10px;font-style:italic}.pin{position:absolute;right:56px;bottom:45px;color:var(--brass);font:9px ui-monospace,monospace}
    .phase-strip{display:grid;grid-template-columns:repeat(4,1fr);margin:24px 0;border:1px solid #685231}
    .phase-strip button{padding:15px 3px;border:0;border-right:1px solid #685231;background:transparent;font-size:9px}.phase-strip button:last-child{border:0}.phase-strip button.active{background:#59283d;color:#f4decd}
    .iris-wrap{display:grid;grid-template-columns:106px 1fr;gap:15px;align-items:center;margin-top:22px}
    .iris{position:relative;width:106px;height:106px;border:8px solid #52432f;border-radius:50%;background:repeating-conic-gradient(from 8deg,#a28755 0 18deg,#2a2026 19deg 42deg);box-shadow:inset 0 0 28px #000}
    .iris:after{position:absolute;inset:var(--aperture,32px);border-radius:50%;background:#080608;box-shadow:0 0 12px #d7b778;content:"";transition:inset .25s}
    .aperture input{width:100%;accent-color:var(--brass)}.aperture output{display:block;margin-top:8px;color:#c1ab82;font:10px ui-monospace,monospace}
    .observations{display:grid;gap:8px;margin-top:24px}.observation{display:grid;grid-template-columns:28px 1fr auto;align-items:center;padding:10px;border:1px solid #493b2d;background:#211720}
    .observation i{font-style:normal;color:#c09d63}.observation span{font-size:10px}.observation button{width:34px;height:18px;padding:0;border:1px solid #705f43;border-radius:12px;background:#171017}.observation button:after{display:block;width:10px;height:10px;margin:3px;border-radius:50%;background:#6e5f4c;content:"";transition:.2s}.observation button.on:after{margin-left:18px;background:#d7b56f;box-shadow:0 0 9px #e6bd72}
    @media(max-width:1050px){.conservatory{grid-template-columns:280px 1fr}.rail:last-child{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:24px}.stage{min-height:760px}.specimen{height:680px}}
    @media(max-width:700px){.conservatory{display:block;border-width:5px}.rail{padding:22px}.moon-clock{width:190px;height:190px}.hour{transform:translate(-50%,-50%) rotate(calc(var(--i)*45deg)) translateY(-81px) rotate(calc(var(--i)*-45deg))}.stage{min-height:680px}.specimen{width:92%;height:630px}.botanical{transform:translateX(-50%) scale(.85);transform-origin:bottom}.rail:last-child{display:block}}
  </style>
</head>
<body>
  <main class="conservatory">
    <aside class="rail">
      <div class="kicker">NOCTURNE / HOURS AFTER DUSK</div>
      <h2>月时培养钟</h2>
      <p>夜花只在正确的月相与时辰交换香气。</p>
      <div class="moon-clock" id="moonClock">
        <div class="moon" id="moon"></div>
        <button class="hour" style="--i:0" data-time="00:00" data-phase="55%">子</button><button class="hour" style="--i:1" data-time="01:30" data-phase="68%">丑</button>
        <button class="hour active" style="--i:2" data-time="03:00" data-phase="82%">寅</button><button class="hour" style="--i:3" data-time="04:30" data-phase="96%">卯</button>
        <button class="hour" style="--i:4" data-time="18:00" data-phase="10%">酉</button><button class="hour" style="--i:5" data-time="19:30" data-phase="22%">戌</button>
        <button class="hour" style="--i:6" data-time="21:00" data-phase="34%">亥</button><button class="hour" style="--i:7" data-time="22:30" data-phase="44%">夜</button>
      </div>
      <div class="time-readout" id="timeReadout">03:00 · 花冠初张</div>

      <div class="kicker" style="margin-top:35px">SCENT ACCORD / 拖动瓶身</div>
      <div class="vials">
        <label class="vial" style="--liquid:#6f334c;--level:68%"><input type="range" min="10" max="90" value="68"><span>晚香玉</span></label>
        <label class="vial" style="--liquid:#9b7743;--level:42%;height:138px"><input type="range" min="10" max="90" value="42"><span>冷檀</span></label>
        <label class="vial" style="--liquid:#344c41;--level:55%;height:177px"><input type="range" min="10" max="90" value="55"><span>湿苔</span></label>
      </div>
    </aside>

    <section class="stage">
      <article class="specimen">
        <header class="plate-head"><strong>Datura Nocturna</strong><span>PLATE XVII · ♀</span></header>
        <div class="botanical">
          <div class="flower" id="flower" style="--bloom:.52">
            <i class="petal" style="--i:0"></i><i class="petal" style="--i:1"></i><i class="petal" style="--i:2"></i><i class="petal" style="--i:3"></i>
            <i class="petal" style="--i:4"></i><i class="petal" style="--i:5"></i><i class="petal" style="--i:6"></i><i class="petal" style="--i:7"></i><i class="flower-core"></i>
          </div>
          <i class="stem"></i><i class="leaf l1"></i><i class="leaf l2"></i><i class="leaf l3"></i>
        </div>
        <div class="specimen-note">“午夜之后，花萼会记住凝视者的温度。”</div><div class="pin">N—04 / 27°C</div>
      </article>
    </section>

    <aside class="rail">
      <div>
        <div class="kicker">BLOOM SEQUENCE</div><h2>花冠阶段</h2>
        <div class="phase-strip" id="phaseStrip">
          <button data-bloom=".15">闭合</button><button class="active" data-bloom=".52">初张</button><button data-bloom=".82">盛放</button><button data-bloom="1">散香</button>
        </div>
      </div>

      <div>
        <div class="kicker">LENS APERTURE</div><h2>观察孔径</h2>
        <div class="iris-wrap">
          <div class="iris" id="iris"></div>
          <label class="aperture"><input id="aperture" type="range" min="12" max="42" value="32"><output id="apertureOut">ƒ / 3.2</output></label>
        </div>
      </div>

      <div class="observations">
        <div class="observation"><i>✦</i><span>记录花粉金光</span><button class="on" aria-label="记录花粉金光"></button></div>
        <div class="observation"><i>☾</i><span>隔绝人造月光</span><button aria-label="隔绝人造月光"></button></div>
        <div class="observation"><i>♧</i><span>释放夜蛾授粉</span><button class="on" aria-label="释放夜蛾授粉"></button></div>
      </div>
    </aside>
  </main>

  <script>
    const moon=document.querySelector("#moon"),timeReadout=document.querySelector("#timeReadout");
    document.querySelectorAll(".hour").forEach(h=>h.onclick=()=>{document.querySelectorAll(".hour").forEach(x=>x.classList.toggle("active",x===h));moon.style.setProperty("--phase",h.dataset.phase);timeReadout.textContent=h.dataset.time+" · "+(["花冠闭合","露水聚集","花冠初张","香气上升"][Math.floor(Math.random()*4)])});
    document.querySelectorAll(".vial input").forEach(input=>input.oninput=()=>input.parentElement.style.setProperty("--level",input.value+"%"));
    const flower=document.querySelector("#flower");
    document.querySelectorAll("#phaseStrip button").forEach(b=>b.onclick=()=>{document.querySelectorAll("#phaseStrip button").forEach(x=>x.classList.toggle("active",x===b));flower.style.setProperty("--bloom",b.dataset.bloom);document.documentElement.style.setProperty("--glow",b.dataset.bloom)});
    const aperture=document.querySelector("#aperture"),iris=document.querySelector("#iris"),out=document.querySelector("#apertureOut");
    aperture.oninput=()=>{iris.style.setProperty("--aperture",aperture.value+"px");out.value="ƒ / "+(aperture.value/10).toFixed(1)};
    document.querySelectorAll(".observation button").forEach(b=>b.onclick=()=>b.classList.toggle("on"));
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-signature" content="one-bit-pixel-paint,draggable-windows,menu-dropdown,marquee-selection,bitmap-scrollbar,save-dialog,file-manager">
  <title>BITMAP — 1-Bit Workshop</title>
  <style>
    :root{--black:#000;--white:#fff;--grid:22px}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;overflow:hidden;background:var(--white);color:var(--black);font-family:Monaco,"Courier New",monospace;font-size:12px}
    button,input{font:inherit;color:inherit;border-radius:0}button{cursor:pointer}
    .desktop{position:relative;width:100vw;height:100vh;min-height:670px;overflow:hidden;background-color:#fff;background-image:linear-gradient(45deg,#000 25%,transparent 25%,transparent 75%,#000 75%),linear-gradient(45deg,#000 25%,transparent 25%,transparent 75%,#000 75%);background-position:0 0,4px 4px;background-size:8px 8px}
    .menu-bar{position:absolute;z-index:1000;left:0;right:0;top:0;display:flex;height:30px;border-bottom:3px solid #000;background:#fff}
    .system{width:45px;border:0;border-right:2px solid #000;background:#fff;font-size:17px}.menu{position:relative}.menu>button{height:27px;padding:0 15px;border:0;background:#fff;font-weight:bold}.menu.open>button{background:#000;color:#fff}.dropdown{position:absolute;display:none;top:27px;left:0;min-width:180px;padding:4px;border:2px solid #000;background:#fff;box-shadow:5px 5px 0 #000}.menu.open .dropdown{display:block}.dropdown button{display:flex;justify-content:space-between;width:100%;padding:6px 8px;border:0;background:#fff;text-align:left}.dropdown button:hover{background:#000;color:#fff}.dropdown hr{margin:3px;border:0;border-top:2px solid #000}.clock{margin-left:auto;padding:7px 13px;font-weight:bold}
    .icon{position:absolute;width:72px;border:0;background:transparent;text-align:center}.icon i{display:block;position:relative;width:44px;height:38px;margin:auto;border:3px solid #000;background:#fff;box-shadow:3px 3px 0 #000}.icon.folder i:before{position:absolute;left:2px;top:-10px;width:19px;height:9px;border:3px solid #000;border-bottom:0;background:#fff;content:""}.icon.trash i{width:33px;height:42px;clip-path:polygon(12% 0,88% 0,100% 100%,0 100%);background:repeating-linear-gradient(90deg,#fff 0 5px,#000 5px 7px)}.icon span{display:inline-block;margin-top:7px;padding:2px;background:#fff}.icon.active span{background:#000;color:#fff}
    .window{position:absolute;z-index:5;border:3px solid #000;background:#fff;box-shadow:7px 7px 0 #000}.titlebar{display:grid;grid-template-columns:27px 1fr 27px;align-items:center;height:29px;border-bottom:3px solid #000;background:repeating-linear-gradient(#fff 0 2px,#000 2px 4px);cursor:move}.titlebar strong{justify-self:center;padding:2px 10px;background:#fff;font-size:11px}.close,.zoom{display:grid;place-items:center;width:19px;height:19px;margin-left:4px;border:2px solid #000;background:#fff;font-weight:bold}.zoom{margin:0 4px 0 auto}.zoom:after{width:9px;height:9px;border:1px solid #000;content:""}
    .paint-window{left:15%;top:8%;width:min(720px,68vw);height:580px}.paint-body{display:grid;grid-template-columns:78px 1fr;height:calc(100% - 29px)}.tools{display:grid;grid-template-columns:1fr 1fr;align-content:start;border-right:3px solid #000;background:#fff}.tool{display:grid;place-items:center;height:49px;border:0;border-right:1px solid #000;border-bottom:1px solid #000;background:#fff;font-size:18px}.tool:nth-child(even){border-right:0}.tool.active{background:#000;color:#fff}.color-wells{grid-column:1/-1;position:relative;height:80px;border-bottom:1px solid #000}.well{position:absolute;width:38px;height:38px;border:3px solid #000}.well.back{right:9px;bottom:9px;background:#fff}.well.front{left:9px;top:9px;background:#000}
    .canvas-shell{display:grid;grid-template-columns:1fr 24px;grid-template-rows:1fr 24px;min-width:0;min-height:0;background:#fff}.pixel-canvas-wrap{display:grid;place-items:center;overflow:auto;background-image:linear-gradient(45deg,#bbb 25%,transparent 25%,transparent 75%,#bbb 75%),linear-gradient(45deg,#bbb 25%,transparent 25%,transparent 75%,#bbb 75%);background-position:0 0,6px 6px;background-size:12px 12px}
    .pixel-canvas{position:relative;display:grid;grid-template-columns:repeat(16,var(--grid));grid-template-rows:repeat(12,var(--grid));border:3px solid #000;background:#fff;box-shadow:3px 3px 0 #000;cursor:crosshair}.pixel{width:var(--grid);height:var(--grid);padding:0;border:0;border-right:1px dotted #aaa;border-bottom:1px dotted #aaa;background:#fff}.pixel.on{background:#000}.pixel.selecting{filter:invert(1)}
    .marquee{position:absolute;z-index:3;display:none;left:var(--x);top:var(--y);width:var(--w);height:var(--h);border:2px dashed #000;outline:1px dashed #fff;animation:march .4s steps(2) infinite;pointer-events:none}@keyframes march{to{filter:invert(1)}}
    .vscroll{grid-column:2;grid-row:1;border-left:3px solid #000;background:repeating-linear-gradient(45deg,#000 0 1px,#fff 1px 4px)}.hscroll{grid-column:1;grid-row:2;border-top:3px solid #000;background:repeating-linear-gradient(45deg,#000 0 1px,#fff 1px 4px)}.scroll-thumb{border:2px solid #000;background:#fff}.vscroll .scroll-thumb{width:100%;height:82px;margin-top:48px}.hscroll .scroll-thumb{width:130px;height:100%;margin-left:90px}
    .resize{grid-column:2;grid-row:2;border:3px solid #000;border-right:0;border-bottom:0;background:repeating-linear-gradient(135deg,transparent 0 4px,#000 4px 6px)}
    .info-window{right:2%;top:12%;width:230px}.info-body{padding:12px}.preview{display:grid;place-items:center;height:155px;border:2px solid #000;background:#fff;image-rendering:pixelated}.preview-grid{display:grid;grid-template-columns:repeat(16,4px);grid-template-rows:repeat(12,4px)}.preview-grid i{width:4px;height:4px}.preview-grid i.on{background:#000}.meter{display:grid;grid-template-columns:80px 1fr;margin-top:12px;border:2px solid #000}.meter span,.meter output{padding:5px}.meter span{border-right:2px solid #000;background:#000;color:#fff}
    .files-window{right:3%;bottom:4%;width:285px}.file-list{padding:7px;height:190px;overflow:auto}.file-row{display:grid;grid-template-columns:27px 1fr auto;align-items:center;padding:7px 5px;border:0;background:#fff;text-align:left}.file-row:hover,.file-row.active{background:#000;color:#fff}.file-pic{width:19px;height:19px;border:2px solid currentColor;background:repeating-linear-gradient(0deg,transparent 0 3px,currentColor 3px 4px)}.file-row small{font-size:9px}
    dialog{width:360px;padding:0;border:3px solid #000;background:#fff;color:#000;box-shadow:10px 10px 0 #000}dialog::backdrop{background:repeating-linear-gradient(45deg,#fff8 0 3px,#0008 3px 6px)}dialog .titlebar{cursor:default}.dialog-body{padding:20px}.dialog-body label{display:block;margin-bottom:6px}.dialog-body input{width:100%;padding:8px;border:2px solid #000}.dialog-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}.dialog-actions button{padding:7px 14px;border:2px solid #000;background:#fff;box-shadow:2px 2px 0 #000}.dialog-actions .default{outline:2px solid #000;outline-offset:2px}
    .toast{position:absolute;z-index:2000;left:50%;bottom:20px;display:none;padding:9px 18px;border:3px solid #000;background:#fff;box-shadow:5px 5px 0 #000;transform:translateX(-50%)}.toast.show{display:block}
    @media(max-width:850px){.paint-window{left:3%;width:78vw}.info-window{right:1%;width:190px}.files-window{display:none}.menu:nth-of-type(n+4){display:none}}
    @media(max-width:600px){.desktop{min-height:740px}.paint-window{left:2%;top:9%;width:96vw;height:560px}.info-window{left:5%;right:auto;top:590px;width:90%;height:130px}.info-body{display:flex;gap:15px}.preview{width:110px;height:85px}.files-window{display:none}.pixel-canvas{--grid:17px}.menu:nth-of-type(n+3){display:none}}
  </style>
</head>
<body>
  <main class="desktop" id="desktop">
    <header class="menu-bar">
      <button class="system">◆</button>
      <div class="menu"><button>File</button><div class="dropdown"><button data-action="new"><span>New Canvas</span><span>⌘N</span></button><button data-action="save"><span>Save As…</span><span>⌘S</span></button><hr><button data-action="close"><span>Close Window</span><span>⌘W</span></button></div></div>
      <div class="menu"><button>Edit</button><div class="dropdown"><button data-action="invert"><span>Invert</span><span>⌘I</span></button><button data-action="clear"><span>Clear</span><span>⌫</span></button><hr><button data-action="selectall"><span>Select All</span><span>⌘A</span></button></div></div>
      <div class="menu"><button>Pattern</button><div class="dropdown"><button data-action="checker">Checkerboard</button><button data-action="stripes">Stripes</button><button data-action="face">Happy Face</button></div></div>
      <div class="menu"><button>Window</button><div class="dropdown"><button>Paint — Untitled</button><button>Info</button><button>Scrap Files</button></div></div>
      <time class="clock" id="clock">09:41</time>
    </header>

    <button class="icon folder" style="left:22px;top:65px"><i></i><span>Scraps</span></button>
    <button class="icon trash" style="left:22px;bottom:28px"><i></i><span>Trash</span></button>

    <section class="window paint-window" data-draggable>
      <header class="titlebar"><button class="close">□</button><strong>Paint — Untitled.px</strong><button class="zoom"></button></header>
      <div class="paint-body">
        <aside class="tools" id="tools">
          <button class="tool active" data-tool="pencil" title="Pencil">✎</button><button class="tool" data-tool="eraser" title="Eraser">▱</button>
          <button class="tool" data-tool="fill" title="Fill">▨</button><button class="tool" data-tool="select" title="Select">⌗</button>
          <button class="tool" data-tool="line" title="Line">╱</button><button class="tool" data-tool="stamp" title="Stamp">♙</button>
          <div class="color-wells"><button class="well back" aria-label="白色"></button><button class="well front" aria-label="黑色"></button></div>
        </aside>
        <div class="canvas-shell">
          <div class="pixel-canvas-wrap"><div class="pixel-canvas" id="pixelCanvas"><i class="marquee" id="marquee"></i></div></div>
          <div class="vscroll"><div class="scroll-thumb"></div></div><div class="hscroll"><div class="scroll-thumb"></div></div><div class="resize"></div>
        </div>
      </div>
    </section>

    <aside class="window info-window" data-draggable>
      <header class="titlebar"><button class="close">□</button><strong>Info</strong><button class="zoom"></button></header>
      <div class="info-body"><div class="preview"><div class="preview-grid" id="preview"></div></div><div><div class="meter"><span>Black</span><output id="blackCount">0 px</output></div><div class="meter"><span>Size</span><output>16 × 12</output></div></div></div>
    </aside>

    <aside class="window files-window" data-draggable>
      <header class="titlebar"><button class="close">□</button><strong>Scrap Files</strong><button class="zoom"></button></header>
      <div class="file-list"><button class="file-row active"><i class="file-pic"></i><span>Untitled.px</span><small>192 B</small></button><button class="file-row"><i class="file-pic"></i><span>hourglass.px</span><small>192 B</small></button><button class="file-row"><i class="file-pic"></i><span>pointer.px</span><small>192 B</small></button><button class="file-row"><i class="file-pic"></i><span>hello.txt</span><small>1 KB</small></button></div>
    </aside>

    <dialog id="saveDialog"><header class="titlebar"><span></span><strong>Save Bitmap As…</strong><button class="close" id="dialogClose">□</button></header><div class="dialog-body"><label for="filename">Name:</label><input id="filename" value="Untitled.px"><div class="dialog-actions"><button id="cancelSave">Cancel</button><button class="default" id="confirmSave">Save</button></div></div></dialog>
    <div class="toast" id="toast">Saved to Scraps.</div>
  </main>

  <script>
    const canvas=document.querySelector("#pixelCanvas"),preview=document.querySelector("#preview");let tool="pencil",drawing=false;
    for(let i=0;i<192;i++){const p=document.createElement("button");p.className="pixel";p.dataset.i=i;canvas.insertBefore(p,document.querySelector("#marquee"));const q=document.createElement("i");q.dataset.i=i;preview.appendChild(q);p.onpointerdown=e=>{drawing=true;paint(p);p.setPointerCapture(e.pointerId)};p.onpointerenter=()=>{if(drawing)paint(p)};p.onpointerup=()=>drawing=false}
    function sync(){const pixels=[...document.querySelectorAll(".pixel")];pixels.forEach((p,i)=>preview.children[i].classList.toggle("on",p.classList.contains("on")));document.querySelector("#blackCount").value=pixels.filter(p=>p.classList.contains("on")).length+" px"}
    function paint(p){if(tool==="select"){document.querySelector("#marquee").style.cssText="display:block;--x:22%;--y:25%;--w:50%;--h:42%";return}if(tool==="fill"){document.querySelectorAll(".pixel").forEach(x=>x.classList.toggle("on",!p.classList.contains("on")));tool="pencil"}else p.classList.toggle("on",tool!=="eraser");sync()}
    document.querySelectorAll(".tool").forEach(b=>b.onclick=()=>{tool=b.dataset.tool;document.querySelectorAll(".tool").forEach(x=>x.classList.toggle("active",x===b))});
    document.querySelectorAll(".menu>button").forEach(b=>b.onclick=e=>{e.stopPropagation();const menu=b.parentElement;document.querySelectorAll(".menu").forEach(x=>x.classList.toggle("open",x===menu&&!menu.classList.contains("open")))});
    document.addEventListener("click",()=>document.querySelectorAll(".menu").forEach(x=>x.classList.remove("open")));
    function pattern(type){document.querySelectorAll(".pixel").forEach((p,i)=>{const x=i%16,y=Math.floor(i/16);p.classList.toggle("on",type==="checker"?(x+y)%2===0:type==="stripes"?x%3===0:type==="face"?((y===3&&(x===4||x===11))||(y===8&&x>4&&x<11)||(y===7&&(x===4||x===11))):false)});sync()}
    document.querySelectorAll("[data-action]").forEach(b=>b.onclick=e=>{e.stopPropagation();const a=b.dataset.action;if(a==="save")document.querySelector("#saveDialog").showModal();if(a==="clear"||a==="new")pattern("clear");if(a==="invert")document.querySelectorAll(".pixel").forEach(x=>x.classList.toggle("on"));if(a==="selectall")document.querySelector("#marquee").style.cssText="display:block;--x:0;--y:0;--w:100%;--h:100%";if(["checker","stripes","face"].includes(a))pattern(a);sync();document.querySelectorAll(".menu").forEach(x=>x.classList.remove("open"))});
    document.querySelector("#dialogClose").onclick=document.querySelector("#cancelSave").onclick=()=>document.querySelector("#saveDialog").close();
    document.querySelector("#confirmSave").onclick=()=>{document.querySelector("#saveDialog").close();const toast=document.querySelector("#toast");toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),1200)};
    document.querySelectorAll("[data-draggable]").forEach(w=>{const bar=w.querySelector(".titlebar");let sx,sy,l,t;bar.addEventListener("pointerdown",e=>{if(e.target.tagName==="BUTTON")return;sx=e.clientX;sy=e.clientY;l=w.offsetLeft;t=w.offsetTop;bar.setPointerCapture(e.pointerId)});bar.addEventListener("pointermove",e=>{if(sx===undefined)return;w.style.left=l+e.clientX-sx+"px";w.style.top=t+e.clientY-sy+"px";w.style.right="auto";w.style.bottom="auto"});bar.addEventListener("pointerup",()=>sx=undefined)});
    document.querySelectorAll(".window .close").forEach(b=>{if(b.id!=="dialogClose")b.onclick=()=>b.closest(".window").style.display="none"});
    document.querySelectorAll(".icon").forEach(i=>i.onclick=()=>i.classList.toggle("active"));
    setInterval(()=>{const d=new Date();document.querySelector("#clock").textContent=d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})},1000);pattern("face");
  </script>
</body>
</html>

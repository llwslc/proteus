<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-signature" content="eclipse-phase-orbit,solar-aperture,coordinate-verniers,spectral-filter-bank,baily-bead-chain,totality-countdown,glass-observatory">
  <title>CORONA — Eclipse Observatory</title>
  <style>
    :root{--void:#05080b;--amber:#ffb33d;--cyan:#4de1dc;--glass:#dffcff13;--line:#dfffff44;--phase:36%;--aperture:52%;--exposure:1.6}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--void);color:#e8f5f2;font-family:Eurostile,"Arial Narrow",sans-serif}
    button,input{font:inherit;color:inherit}button{cursor:pointer}
    body{background-image:radial-gradient(circle at 50% 42%,#18242b 0,transparent 38%),radial-gradient(circle at 15% 15%,#4de1dc10 0 1px,transparent 2px);background-size:auto,37px 37px;overflow-x:hidden}
    .observatory{position:relative;min-height:100vh;padding:18px}
    .hud-frame{position:absolute;inset:18px;pointer-events:none;border:1px solid var(--line);clip-path:polygon(0 0,28% 0,29% 9px,71% 9px,72% 0,100% 0,100% 100%,76% 100%,75% calc(100% - 9px),25% calc(100% - 9px),24% 100%,0 100%)}.hud-frame:before,.hud-frame:after{position:absolute;top:50%;width:80px;height:1px;background:var(--cyan);content:""}.hud-frame:before{left:0}.hud-frame:after{right:0}
    .topline{position:relative;z-index:10;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:6px 16px}.topline small{font:8px ui-monospace,monospace;letter-spacing:.18em;color:#9fb5b3}.topline small:last-child{text-align:right}.mark{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:bold;letter-spacing:.2em}.mark i{width:26px;height:26px;border:1px solid var(--amber);border-radius:50%;box-shadow:inset 7px 0 var(--amber)}
    .scope-grid{display:grid;grid-template-columns:250px minmax(500px,1fr) 250px;gap:22px;max-width:1450px;margin:17px auto 0}
    .glass{position:relative;border:1px solid var(--line);background:linear-gradient(135deg,#e8ffff14,#4b747410);box-shadow:inset 0 0 0 1px #ffffff09,0 25px 55px #0008;backdrop-filter:blur(15px)}
    .glass:before{position:absolute;left:8px;top:8px;width:18px;height:18px;border-left:1px solid var(--cyan);border-top:1px solid var(--cyan);content:""}.glass:after{position:absolute;right:8px;bottom:8px;width:18px;height:18px;border-right:1px solid var(--cyan);border-bottom:1px solid var(--cyan);content:""}
    .rail{align-self:center;padding:22px 18px}.rail h2{margin:5px 0 3px;font-size:17px;font-weight:500;letter-spacing:.04em}.micro{color:#7f9997;font:8px ui-monospace,monospace;letter-spacing:.13em}.rule{height:1px;margin:16px 0;background:linear-gradient(90deg,var(--cyan),transparent)}
    .vernier{position:relative;width:170px;height:170px;margin:22px auto;border:1px solid #8cb1ad;border-radius:50%;background:repeating-conic-gradient(from -1deg,var(--line) 0 1deg,transparent 1deg 10deg)}
    .vernier:before{position:absolute;inset:24px;border:1px solid var(--line);border-radius:50%;background:#071014;content:""}.vernier:after{position:absolute;left:50%;top:50%;width:3px;height:60px;background:var(--amber);content:"";transform-origin:50% 0;transform:rotate(var(--az,42deg));box-shadow:0 0 9px var(--amber)}.vernier output{position:absolute;z-index:2;left:50%;top:50%;transform:translate(-50%,-50%);font:15px ui-monospace,monospace}
    .nudge{display:grid;grid-template-columns:repeat(3,35px);grid-template-rows:repeat(3,35px);justify-content:center}.nudge button{border:1px solid var(--line);background:#dfffff08;color:var(--cyan)}.nudge .n{grid-column:2}.nudge .w{grid-row:2}.nudge .center{grid-column:2;grid-row:2;border-radius:50%;background:var(--amber);color:#15100b}.nudge .e{grid-column:3;grid-row:2}.nudge .s{grid-column:2;grid-row:3}
    .filter-bank{display:grid;gap:7px}.filter{position:relative;display:grid;grid-template-columns:30px 1fr auto;align-items:center;padding:8px;border:1px solid var(--line);background:#071014;text-align:left}.filter i{width:18px;height:18px;border-radius:50%;background:var(--c);box-shadow:0 0 10px var(--c)}.filter strong{font-size:9px}.filter output{font:8px ui-monospace,monospace;color:#7d9895}.filter.active{border-color:var(--c);box-shadow:inset 3px 0 var(--c)}
    .scope{position:relative;min-height:720px;overflow:hidden;background:radial-gradient(circle at 50% 48%,#17252b,transparent 55%)}
    .scope-meta{position:absolute;z-index:5;left:20px;right:20px;top:18px;display:flex;justify-content:space-between;color:#85a19e;font:8px ui-monospace,monospace;letter-spacing:.13em}.scope-meta b{color:var(--cyan);font-weight:400}
    .reticle{position:absolute;left:50%;top:47%;width:min(570px,75%);aspect-ratio:1;border:1px solid #c9e6e133;border-radius:50%;transform:translate(-50%,-50%);background:repeating-conic-gradient(transparent 0 4.8deg,#cbe7e122 5deg,#cbe7e122 5.2deg,transparent 5.4deg)}
    .reticle:before,.reticle:after{position:absolute;left:50%;top:50%;content:"";transform:translate(-50%,-50%)}.reticle:before{width:118%;height:1px;background:#dffefa33}.reticle:after{width:1px;height:118%;background:#dffefa33}.orbit{position:absolute;inset:8%;border:1px dashed #b9d7d133;border-radius:50%;animation:orbit 24s linear infinite}.orbit:after{position:absolute;left:50%;top:-5px;width:9px;height:9px;border-radius:50%;background:var(--cyan);box-shadow:0 0 13px var(--cyan);content:""}@keyframes orbit{to{transform:rotate(1turn)}}
    .eclipse{position:absolute;z-index:2;left:50%;top:50%;width:52%;aspect-ratio:1;border-radius:50%;background:radial-gradient(circle,#fff4c6 0 1%,#ffd371 7%,#ff9d22 43%,#d95a0d 67%);box-shadow:0 0 8px #fff,0 0 35px #ffb33d,0 0 110px #ff7b1677;transform:translate(-50%,-50%) scale(var(--exposure));transition:transform .25s}
    .eclipse:before{position:absolute;left:var(--phase);top:0;width:100%;height:100%;border-radius:50%;background:#020406;box-shadow:-4px 0 12px #fff6;content:"";transition:left .35s}.eclipse:after{position:absolute;inset:calc((100% - var(--aperture))/2);border:1px solid #fff6;border-radius:50%;content:"";transition:inset .3s}
    .beads{position:absolute;z-index:4;inset:-4px;border-radius:50%;opacity:0;transition:.2s}.beads.on{opacity:1}.beads i{position:absolute;left:50%;top:50%;width:8px;height:8px;border-radius:50%;background:#fff6be;box-shadow:0 0 12px #fff;transform:translate(-50%,-50%) rotate(calc(var(--i)*30deg)) translateY(clamp(-145px,-13vw,-75px))}
    .phase-read{position:absolute;z-index:5;left:50%;bottom:68px;text-align:center;transform:translateX(-50%)}.phase-read output{display:block;color:var(--amber);font:32px ui-monospace,monospace}.phase-read span{font:8px ui-monospace,monospace;letter-spacing:.2em;color:#8fa7a4}
    .phase-track{position:absolute;z-index:6;left:9%;right:9%;bottom:25px;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;color:#9bb1ae;font:8px ui-monospace,monospace}.phase-track input{width:100%;appearance:none;height:2px;background:linear-gradient(90deg,var(--amber) var(--phase),#68807c var(--phase));accent-color:var(--amber)}.phase-track input::-webkit-slider-thumb{appearance:none;width:15px;height:15px;border:1px solid white;border-radius:50%;background:var(--amber);box-shadow:0 0 9px var(--amber)}
    .aperture{position:relative;width:155px;height:155px;margin:20px auto;border:14px solid #1b282c;border-radius:50%;background:repeating-conic-gradient(#6d8582 0 24deg,#18252a 25deg 45deg);box-shadow:inset 0 0 22px #000,0 0 0 1px #8eaaa6}.aperture:before{position:absolute;inset:calc(var(--ap-inset,30)*1px);border-radius:50%;background:#010203;box-shadow:0 0 8px var(--amber);content:"";transition:.25s}.aperture button{position:absolute;z-index:2;left:50%;top:50%;width:60px;height:60px;border:1px solid var(--line);border-radius:50%;background:transparent;transform:translate(-50%,-50%);font-size:9px}
    .exposure-drum{display:grid;grid-template-columns:38px 1fr 38px;border:1px solid var(--line)}.exposure-drum button{border:0;background:#dfffff0b;color:var(--cyan);font-size:18px}.exposure-drum output{padding:10px;text-align:center;font:12px ui-monospace,monospace;border-left:1px solid var(--line);border-right:1px solid var(--line)}
    .bead-toggle{width:100%;margin-top:12px;padding:11px;border:1px solid var(--amber);background:transparent;font-size:9px;letter-spacing:.13em}.bead-toggle.on{background:var(--amber);color:#15100b;box-shadow:0 0 18px #ffb33d55}
    .countdown{position:relative;margin-top:23px;padding:18px;border:1px solid var(--line);text-align:center}.countdown output{display:block;color:var(--amber);font:26px ui-monospace,monospace}.countdown span{font-size:8px;letter-spacing:.14em}.countdown button{position:absolute;right:6px;top:6px;width:22px;height:22px;padding:0;border:1px solid var(--cyan);border-radius:50%;background:transparent;font-size:9px}
    @media(max-width:1050px){.scope-grid{grid-template-columns:220px 1fr}.rail:last-child{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}.scope{min-height:700px}}
    @media(max-width:700px){.observatory{padding:7px}.scope-grid{display:block}.rail{margin:10px 0}.scope{min-height:620px}.reticle{width:88%}.topline small{display:none}.rail:last-child{display:block}.vernier{width:140px;height:140px}.hud-frame{inset:7px}}
  </style>
</head>
<body>
  <main class="observatory">
    <div class="hud-frame"></div>
    <header class="topline"><small>SITE / ATACAMA NODE 07</small><div class="mark"><i></i>CORONA LAB</div><small>UTC−04 / 23 JUL 2026</small></header>

    <section class="scope-grid">
      <aside class="glass rail">
        <div class="micro">TRACKING / CELESTIAL AXIS</div><h2>坐标微调盘</h2><div class="rule"></div>
        <div class="vernier" id="vernier"><output id="azimuth">042.6°</output></div>
        <div class="nudge"><button class="n" data-nudge="-1">△</button><button class="w" data-nudge="-.1">◁</button><button class="center" id="lock">◎</button><button class="e" data-nudge=".1">▷</button><button class="s" data-nudge="1">▽</button></div>

        <div class="micro" style="margin-top:27px">SPECTRAL FILTER BANK</div><h2>谱线滤镜</h2><div class="rule"></div>
        <div class="filter-bank">
          <button class="filter active" style="--c:#ff4949"><i></i><strong>H-ALPHA</strong><output>656.3nm</output></button>
          <button class="filter" style="--c:#4de1dc"><i></i><strong>OXYGEN III</strong><output>500.7nm</output></button>
          <button class="filter" style="--c:#b595ff"><i></i><strong>CALCIUM K</strong><output>393.4nm</output></button>
          <button class="filter" style="--c:#ffd47b"><i></i><strong>WHITE LIGHT</strong><output>FULL</output></button>
        </div>
      </aside>

      <section class="glass scope">
        <header class="scope-meta"><span>RA <b>08h 23m 14.2s</b></span><span>LOCK <b id="lockState">ACQUIRED</b></span><span>DEC <b>+19° 42′ 08″</b></span></header>
        <div class="reticle">
          <div class="orbit"></div>
          <div class="eclipse" id="eclipse"><div class="beads" id="beads"></div></div>
        </div>
        <div class="phase-read"><output id="phaseOut">64.0%</output><span>OBSCURATION / PARTIAL</span></div>
        <label class="phase-track"><span>C1</span><input id="phase" type="range" min="-15" max="115" value="36"><span>C4</span></label>
      </section>

      <aside class="glass rail">
        <div class="micro">OPTICAL TRAIN / PRIMARY</div><h2>入光孔径</h2><div class="rule"></div>
        <div class="aperture" id="aperture"><button id="apertureButton">ƒ / 5.2</button></div>

        <div class="micro" style="margin-top:26px">EXPOSURE DRUM</div><h2>日冕曝光</h2>
        <div class="exposure-drum"><button id="expMinus">−</button><output id="exposureOut">1.6×</output><button id="expPlus">+</button></div>
        <button class="bead-toggle" id="beadToggle">BAILY BEADS / 贝利珠 OFF</button>

        <div class="countdown"><button id="countButton">▶</button><output id="countdown">00:02:18</output><span>UNTIL TOTALITY / 距全食</span></div>
      </aside>
    </section>
  </main>

  <script>
    const beads=document.querySelector("#beads");for(let i=0;i<12;i++){const b=document.createElement("i");b.style.setProperty("--i",i);beads.appendChild(b)}
    const phase=document.querySelector("#phase");phase.oninput=()=>{document.documentElement.style.setProperty("--phase",phase.value+"%");document.querySelector("#phaseOut").value=Math.max(0,100-Math.abs(50-phase.value)*2).toFixed(1)+"%"};
    let az=42.6;document.querySelectorAll("[data-nudge]").forEach(b=>b.onclick=()=>{az=(az+ +b.dataset.nudge+360)%360;document.querySelector("#azimuth").value=az.toFixed(1).padStart(5,"0")+"°";document.querySelector("#vernier").style.setProperty("--az",az+"deg")});
    document.querySelector("#lock").onclick=()=>{const state=document.querySelector("#lockState");state.textContent=state.textContent==="ACQUIRED"?"FREE":"ACQUIRED"};
    document.querySelectorAll(".filter").forEach(f=>f.onclick=()=>{document.querySelectorAll(".filter").forEach(x=>x.classList.toggle("active",x===f));document.documentElement.style.setProperty("--amber",getComputedStyle(f).getPropertyValue("--c"))});
    let aperture=30;document.querySelector("#apertureButton").onclick=e=>{aperture=aperture===30?16:aperture===16?42:30;document.querySelector("#aperture").style.setProperty("--ap-inset",aperture);document.documentElement.style.setProperty("--aperture",(100-aperture)+"%");e.currentTarget.textContent="ƒ / "+(aperture/10+2.2).toFixed(1)};
    let exposure=1.6;function setExposure(delta){exposure=Math.max(.8,Math.min(2.2,exposure+delta));document.documentElement.style.setProperty("--exposure",exposure);document.querySelector("#exposureOut").value=exposure.toFixed(1)+"×"}document.querySelector("#expMinus").onclick=()=>setExposure(-.1);document.querySelector("#expPlus").onclick=()=>setExposure(.1);
    document.querySelector("#beadToggle").onclick=e=>{beads.classList.toggle("on");e.currentTarget.classList.toggle("on");e.currentTarget.textContent="BAILY BEADS / 贝利珠 "+(beads.classList.contains("on")?"ON":"OFF")};
    let seconds=138,timer;document.querySelector("#countButton").onclick=e=>{if(timer){clearInterval(timer);timer=null;e.currentTarget.textContent="▶";return}e.currentTarget.textContent="Ⅱ";timer=setInterval(()=>{seconds=Math.max(0,seconds-1);const m=Math.floor(seconds/60),s=seconds%60;document.querySelector("#countdown").value=`00:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;if(!seconds){clearInterval(timer);timer=null}},1000)};
  </script>
</body>
</html>

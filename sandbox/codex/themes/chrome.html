<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-signature" content="liquid-media-orb,cd-track-ring,gel-equalizer,aqua-volume-tube,buddy-bubbles,chrome-skin-slider">
  <title>CHROME — Liquid Player 2001</title>
  <style>
    :root{--sky:#8ed9ff;--blue:#316dd7;--pink:#ff72cc;--lime:#b8ff53;--ink:#163359;--refract:22deg}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#76bde5;color:var(--ink);font-family:"Arial Rounded MT Bold","Trebuchet MS",sans-serif}
    button,input{font:inherit;color:inherit}button{cursor:pointer}
    body{overflow-x:hidden;background:radial-gradient(circle at 50% -10%,#fff 0 8%,#a8e5ff 30%,#78b8e3 64%,#647bd0 100%)}
    .aero{position:relative;min-height:100vh;padding:26px;overflow:hidden}
    .bubble-bg{position:absolute;border-radius:50%;border:1px solid #fff;background:radial-gradient(circle at 32% 25%,#fff 0 5%,#ffffff55 10%,#84f7ff44 38%,#e45bff33 70%,transparent 74%);box-shadow:inset -12px -15px 22px #4b4bca38,0 16px 30px #31559933;animation:float 7s ease-in-out infinite}.b1{width:190px;height:190px;left:-50px;top:18%}.b2{width:90px;height:90px;right:5%;top:8%;animation-delay:-2s}.b3{width:130px;height:130px;right:18%;bottom:-35px;animation-delay:-4s}
    @keyframes float{50%{transform:translateY(-18px) rotate(8deg)}}
    .topbar{position:relative;z-index:3;display:flex;justify-content:space-between;align-items:center;max-width:1300px;margin:auto;padding:0 12px}.wordmark{font-size:23px;font-style:italic;letter-spacing:-.07em;text-shadow:0 2px #fff}.wordmark b{color:#fff;-webkit-text-stroke:1px var(--blue)}.topbar nav{display:flex;gap:8px}.topbar nav button{padding:8px 14px;border:1px solid #fff;border-radius:99px;background:#ffffff45;box-shadow:inset 0 2px 3px #fff,0 4px 8px #4c65a738;font-size:10px}.topbar nav button.active{background:linear-gradient(#f8ffff,#74d9ff);color:#1c4da1}
    .desktop{position:relative;z-index:2;display:grid;grid-template-columns:250px minmax(480px,1fr) 250px;gap:24px;max-width:1300px;margin:38px auto 0;align-items:center}
    .pod{position:relative;padding:18px;border:1px solid #fff;border-radius:44px 24px 52px 20px;background:linear-gradient(135deg,#ffffffa8,#95e8ff66 45%,#d69bff77);box-shadow:inset 0 3px 4px #fff,0 24px 50px #314a8b44,8px 9px 0 #ffffff33;backdrop-filter:blur(14px)}
    .pod:before{position:absolute;inset:6px;border:1px solid #ffffff99;border-radius:inherit;pointer-events:none;content:""}.pod h2{position:relative;margin:3px 0 16px;font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}
    .buddy-list{position:relative;display:grid;gap:13px}.buddy{display:grid;grid-template-columns:43px 1fr auto;gap:9px;align-items:center;border:0;background:transparent;text-align:left}.avatar{display:grid;place-items:center;width:43px;height:43px;border:2px solid #fff;border-radius:50%;background:radial-gradient(circle at 35% 25%,#fff,#8fddff 40%,#6773dc);box-shadow:inset -6px -6px 10px #644acf55,0 5px 8px #3f57a650;font-size:17px}.buddy strong{display:block;font-size:10px}.buddy small{display:block;color:#416397;font:8px ui-monospace,monospace}.status{width:9px;height:9px;border-radius:50%;background:var(--lime);box-shadow:0 0 9px #62ff59}.buddy.away .status{background:#ffe356}.buddy:hover .avatar{transform:scale(1.08)}
    .mail-orb{position:relative;display:grid;place-items:center;width:145px;height:90px;margin:22px auto 4px;border:0;border-radius:50%;background:radial-gradient(ellipse at 32% 22%,#fff 0 7%,#9ff5ff 26%,#6288e5 65%,#3154b5);color:white;box-shadow:inset -10px -12px 18px #3d3baf66,0 12px 20px #445aab55;font-size:11px}.mail-orb:after{position:absolute;right:19px;top:14px;width:17px;height:17px;border-radius:50%;background:var(--pink);content:"3";display:grid;place-items:center;font-size:8px;box-shadow:0 0 0 2px white}
    .player{position:relative;min-height:660px;padding:30px 45px;border:2px solid #fff;border-radius:92px 42px 108px 48px;background:linear-gradient(145deg,#ffffffcc,#83dfff88 22%,#7b80dfbb 62%,#e590e6aa);box-shadow:inset 0 6px 8px #fff,inset -18px -22px 30px #4950b144,0 38px 70px #31428c55;backdrop-filter:blur(16px)}
    .player:after{position:absolute;inset:9px;border:1px solid #ffffffbb;border-radius:inherit;pointer-events:none;content:""}
    .display{position:relative;z-index:2;display:flex;justify-content:space-between;align-items:center;padding:13px 20px;border-radius:35px;background:#1b4c78;color:#b9f9ff;box-shadow:inset 0 3px 10px #061e3b,0 2px 0 #fff;font:10px ui-monospace,monospace}.display output{font-size:20px}.display i{width:8px;height:8px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime)}
    .disc-zone{position:relative;height:365px}
    .disc{position:absolute;left:50%;top:50%;width:270px;height:270px;border-radius:50%;background:repeating-conic-gradient(from var(--refract),#d8fbff 0 5deg,#8aa8e7 6deg 11deg,#ffc5f1 12deg 16deg,#b7ffef 17deg 22deg);transform:translate(-50%,-50%);box-shadow:inset 0 0 0 3px #fff,inset 0 0 0 35px #ffffff66,0 20px 30px #2d498b55;animation:spin 4s linear infinite paused}.player.playing .disc{animation-play-state:running}@keyframes spin{to{transform:translate(-50%,-50%) rotate(1turn)}}
    .disc:before{position:absolute;inset:42px;border-radius:50%;background:radial-gradient(circle,#294a91 0 12%,#d6f7ff 13% 20%,#527acb 21% 25%,transparent 26%);content:"";box-shadow:inset 0 0 22px #fff}
    .album-orb{position:absolute;z-index:2;left:50%;top:50%;display:grid;place-items:center;width:108px;height:108px;border-radius:50%;background:radial-gradient(circle at 35% 28%,#fff,#ff87d3 25%,#7169d5 67%,#28488d);color:#fff;text-align:center;transform:translate(-50%,-50%);box-shadow:inset -8px -10px 14px #1b3d8e88,0 0 0 5px #fff7}.album-orb strong{font-size:20px;line-height:.8;text-transform:uppercase}.album-orb small{font:7px ui-monospace,monospace}
    .track-dot{position:absolute;left:50%;top:50%;width:33px;height:33px;padding:0;border:2px solid #fff;border-radius:50%;background:linear-gradient(#c6f7ff,#779ae4);transform:translate(-50%,-50%) rotate(calc(var(--i)*60deg)) translateY(-166px) rotate(calc(var(--i)*-60deg));box-shadow:inset 0 3px 4px #fff,0 5px 8px #314f9c55;font:9px ui-monospace,monospace}.track-dot.active{background:linear-gradient(#fff,#ff77c8);transform:translate(-50%,-50%) rotate(calc(var(--i)*60deg)) translateY(-166px) rotate(calc(var(--i)*-60deg)) scale(1.2)}
    .transport{position:relative;z-index:3;display:flex;justify-content:center;align-items:center;gap:15px}.transport button{display:grid;place-items:center;width:48px;height:42px;border:1px solid #fff;border-radius:50%;background:radial-gradient(circle at 40% 22%,#fff,#8fe4ff 40%,#6474d6);box-shadow:inset 0 3px 4px #fff,0 8px 12px #304f9b66;font-size:14px}.transport .play{width:78px;height:62px;background:radial-gradient(circle at 40% 20%,#fff,#ff9cdd 37%,#6772d7 76%);font-size:22px}.transport button:active{transform:scale(.9)}
    .skin{position:relative;z-index:3;display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;margin-top:20px;padding:10px 15px;border-radius:99px;background:#ffffff55;font:8px ui-monospace,monospace}.skin input{width:100%;accent-color:var(--pink)}
    .equalizer{position:relative;display:flex;justify-content:space-around;align-items:flex-end;height:180px;padding:15px 8px 0}.eq{position:relative;width:26px;height:var(--h);border:0;border-radius:18px;background:linear-gradient(to top,#5371d4,var(--pink) 70%,#fff);box-shadow:inset 4px 3px 6px #fff8,0 6px 9px #3a52a255;transition:height .2s}.eq:after{position:absolute;left:6px;top:5px;width:8px;height:28%;border-radius:10px;background:#fff8;content:""}.eq.active{filter:hue-rotate(90deg)}
    .volume-tube{position:relative;width:64px;height:210px;margin:18px auto 25px;border:3px solid #fff;border-radius:35px;background:#ffffff48;box-shadow:inset 0 0 12px #3876c877}.water{position:absolute;left:6px;right:6px;bottom:6px;height:68%;border-radius:28px;background:linear-gradient(#8ef4ff,#3979d4);transition:height .2s}.water:before{position:absolute;left:4px;right:4px;top:4px;height:18px;border-radius:50%;background:#d4ffff;content:""}.volume-tube input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:ns-resize;writing-mode:vertical-lr;direction:rtl}.volume-read{text-align:center;font:18px ui-monospace,monospace}
    @media(max-width:1050px){.desktop{grid-template-columns:220px 1fr}.pod:last-child{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;align-items:center}.volume-tube{height:120px}.player{min-height:620px}}
    @media(max-width:700px){.aero{padding:10px}.desktop{display:block;margin-top:18px}.pod{margin:12px 0}.player{padding:20px 15px;min-height:590px}.disc-zone{transform:scale(.83);margin:-25px}.topbar nav{display:none}.pod:last-child{display:block}.equalizer{height:130px}.volume-tube{height:100px}}
  </style>
</head>
<body>
  <main class="aero">
    <i class="bubble-bg b1"></i><i class="bubble-bg b2"></i><i class="bubble-bg b3"></i>
    <header class="topbar"><div class="wordmark"><b>liquid</b>player_01</div><nav><button class="active">MUSIC</button><button>SKINS</button><button>BUDDIES</button></nav></header>

    <section class="desktop">
      <aside class="pod">
        <h2>◉ buddies online</h2>
        <div class="buddy-list">
          <button class="buddy"><span class="avatar">✿</span><span><strong>pixelangel</strong><small>listening to track 04</small></span><i class="status"></i></button>
          <button class="buddy away"><span class="avatar">☻</span><span><strong>cloud_9</strong><small>away / screensaver</small></span><i class="status"></i></button>
          <button class="buddy"><span class="avatar">★</span><span><strong>bluebyte</strong><small>56k but thriving</small></span><i class="status"></i></button>
        </div>
        <button class="mail-orb" id="mailOrb">you've got gel-mail!</button>
      </aside>

      <section class="player" id="player">
        <header class="display"><span><i></i>&nbsp; NOW BUFFERING</span><output id="trackDisplay">01 · AQUA DREAM</output><span id="time">02:41</span></header>
        <div class="disc-zone">
          <div class="disc"></div><div class="album-orb"><span><strong>GEL<br>WAVE</strong><br><small>320 KBPS</small></span></div>
          <button class="track-dot active" style="--i:0" data-track="01 · AQUA DREAM">01</button><button class="track-dot" style="--i:1" data-track="02 · BUBBLE.EXE">02</button>
          <button class="track-dot" style="--i:2" data-track="03 · CYBER KISS">03</button><button class="track-dot" style="--i:3" data-track="04 · SKY DIAL-UP">04</button>
          <button class="track-dot" style="--i:4" data-track="05 · MIRRORBALL">05</button><button class="track-dot" style="--i:5" data-track="06 · LOG OFF LUV">06</button>
        </div>
        <div class="transport"><button id="previous">◀◀</button><button class="play" id="play">▶</button><button id="next">▶▶</button></div>
        <label class="skin"><span>CHROME</span><input id="refract" type="range" min="0" max="90" value="22"><span>HOLO</span></label>
      </section>

      <aside class="pod">
        <h2>gel equalizer</h2>
        <div class="equalizer" id="equalizer">
          <button class="eq" style="--h:38%"></button><button class="eq" style="--h:74%"></button><button class="eq" style="--h:52%"></button><button class="eq" style="--h:88%"></button><button class="eq" style="--h:63%"></button><button class="eq" style="--h:45%"></button>
        </div>
        <div class="volume-read"><output id="volumeOut">68</output>%</div>
        <label class="volume-tube"><span class="water" id="water"></span><input id="volume" type="range" min="0" max="100" value="68" orient="vertical" aria-label="音量"></label>
      </aside>
    </section>
  </main>

  <script>
    const player=document.querySelector("#player"),play=document.querySelector("#play");play.onclick=()=>{player.classList.toggle("playing");play.textContent=player.classList.contains("playing")?"Ⅱ":"▶"};
    const tracks=[...document.querySelectorAll(".track-dot")];let active=0;
    function choose(i){active=(i+tracks.length)%tracks.length;tracks.forEach((x,n)=>x.classList.toggle("active",n===active));document.querySelector("#trackDisplay").value=tracks[active].dataset.track}
    tracks.forEach((t,i)=>t.onclick=()=>choose(i));document.querySelector("#previous").onclick=()=>choose(active-1);document.querySelector("#next").onclick=()=>choose(active+1);
    document.querySelector("#refract").oninput=e=>document.documentElement.style.setProperty("--refract",e.target.value+"deg");
    document.querySelectorAll(".eq").forEach(e=>e.onclick=()=>{e.classList.toggle("active");e.style.setProperty("--h",(25+Math.random()*70)+"%")});
    document.querySelector("#volume").oninput=e=>{document.querySelector("#water").style.height=e.target.value+"%";document.querySelector("#volumeOut").value=e.target.value};
    document.querySelectorAll(".buddy").forEach(b=>b.onclick=()=>b.querySelector("small").textContent="PING! sent ✦");
    document.querySelector("#mailOrb").onclick=e=>{e.currentTarget.textContent="inbox opened · 3 new";e.currentTarget.animate([{transform:"scale(1)"},{transform:"scale(.88)"},{transform:"scale(1)"}],{duration:420})};
  </script>
</body>
</html>

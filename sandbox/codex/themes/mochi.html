<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-signature" content="squish-pad,frosting-nozzles,flavor-beads,bite-control,steam-valve,bento-conveyor,quantity-plunger">
  <title>MOCHI — Puff Lab</title>
  <style>
    :root{--cream:#fff4df;--cocoa:#513b36;--pink:#ffa9bd;--blue:#a6dded;--yellow:#ffd66d;--mint:#bde4bd;--frost:#ffa9bd;--squish:1;--bite:circle(0 at 100% 25%)}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--cream);color:var(--cocoa);font-family:"Arial Rounded MT Bold","Trebuchet MS",sans-serif}
    button,input{font:inherit;color:inherit}button{cursor:pointer}
    body{background-image:radial-gradient(circle at 8% 12%,#ffd36e 0 4px,transparent 5px),radial-gradient(circle at 90% 30%,#ffa7ba 0 3px,transparent 4px),radial-gradient(circle at 34% 88%,#8fd8e8 0 5px,transparent 6px);background-size:90px 90px,110px 110px,130px 130px}
    .bakery{display:grid;grid-template-columns:260px minmax(480px,1fr) 280px;min-height:100vh;padding:20px;gap:18px}
    .menu-board{padding:22px;border-radius:42px 42px 65px 28px;background:#f6d79f;box-shadow:inset 8px 8px 14px #fff9,inset -9px -10px 15px #c89d6677,0 13px 0 #c99762;align-self:center}
    .logo{position:relative;width:85px;height:68px;margin:auto;background:var(--pink);border-radius:55% 45% 48% 52%;box-shadow:inset 8px 7px 0 #ffd6df,0 7px 0 #bd6f81}.logo:before,.logo:after{position:absolute;top:31px;width:7px;height:10px;border-radius:50%;background:var(--cocoa);content:""}.logo:before{left:26px}.logo:after{right:26px}.logo i{position:absolute;left:50%;bottom:14px;width:18px;height:7px;border-bottom:3px solid var(--cocoa);border-radius:50%;transform:translateX(-50%)}
    .menu-board h1{margin:18px 0 3px;text-align:center;font-size:24px;letter-spacing:-.05em}.menu-board>p{text-align:center;margin:0 0 22px;font-size:10px}
    .flavor-beads{display:flex;flex-wrap:wrap;justify-content:center;gap:11px}.flavor{display:grid;place-items:center;width:54px;height:54px;border:0;border-radius:50%;background:var(--c);box-shadow:inset 6px 6px 8px #fff9,inset -6px -7px 8px #8c5c4c33,0 6px 0 #b7847477;font-size:19px}.flavor.active{outline:5px solid white;transform:translateY(-5px)}
    .nozzles{display:flex;justify-content:center;gap:12px;margin-top:22px}.nozzle{position:relative;width:49px;height:67px;border:0;background:#d3c4b6;clip-path:polygon(25% 0,75% 0,100% 72%,64% 100%,36% 100%,0 72%)}.nozzle:after{position:absolute;left:50%;bottom:7px;color:#fff;content:attr(data-tip);font-size:15px;transform:translateX(-50%)}.nozzle.active{background:var(--cocoa);transform:rotate(5deg)}
    .lab{position:relative;display:grid;place-items:center;min-height:calc(100vh - 40px);overflow:hidden;border-radius:80px 28px 80px 35px;background:linear-gradient(145deg,#fffaf0,#f6d8cd);box-shadow:inset 10px 10px 20px #fff,inset -15px -15px 24px #d6a6a455,0 14px 0 #d59f97}
    .awning{position:absolute;left:0;right:0;top:0;height:82px;background:repeating-linear-gradient(90deg,var(--pink) 0 75px,#fff4df 75px 150px);border-radius:70px 25px 25px 25px;box-shadow:0 9px 0 #fff,inset 0 -6px 0 #c97b8c}.awning:after{position:absolute;left:0;right:0;bottom:-25px;height:34px;background:radial-gradient(circle at 25px 0,var(--pink) 0 27px,transparent 28px),radial-gradient(circle at 100px 0,var(--cream) 0 27px,transparent 28px);background-size:150px 34px;content:""}
    .ticket{position:absolute;z-index:3;top:108px;left:30px;padding:9px 14px;border:3px dashed var(--cocoa);background:var(--yellow);font-size:9px;transform:rotate(-3deg);box-shadow:4px 5px 0 #9d7854}
    .steam{position:absolute;top:15%;left:50%;width:230px;height:150px;transform:translateX(-50%);pointer-events:none}.steam i{position:absolute;bottom:0;width:38px;height:90px;border-radius:50%;border-left:12px solid #fff9;filter:blur(1px);opacity:0}.lab.steaming .steam i{animation:steam 2.2s ease-in-out infinite}.steam i:nth-child(1){left:25px}.steam i:nth-child(2){left:94px;animation-delay:-.8s!important}.steam i:nth-child(3){right:19px;animation-delay:-1.4s!important}@keyframes steam{0%{opacity:0;transform:translateY(25px) scale(.7)}45%{opacity:.9}100%{opacity:0;transform:translateY(-50px) scale(1.3) rotate(12deg)}}
    .puff-stage{position:relative;width:430px;height:430px;margin-top:70px}
    .plate{position:absolute;left:50%;bottom:30px;width:390px;height:110px;border-radius:50%;background:radial-gradient(ellipse,#fff 0 44%,#b4dce5 46% 59%,#fff 61%);box-shadow:0 20px 18px #916e6755;transform:translateX(-50%)}
    .puff{position:absolute;z-index:2;left:50%;bottom:72px;width:290px;height:260px;border-radius:48% 52% 38% 42%;background:var(--frost);box-shadow:inset 20px 19px 25px #fff9,inset -23px -26px 28px #975f6f33,0 22px 0 #bc829055,0 34px 25px #a8807866;transform:translateX(-50%) scaleY(var(--squish));transform-origin:50% 100%;transition:transform .18s,background .3s;overflow:hidden}
    .puff:before{position:absolute;left:9%;right:9%;top:13px;height:52px;border-radius:50%;background:#fff8;content:"";filter:blur(2px)}.puff:after{position:absolute;inset:-1px;background:var(--cream);clip-path:var(--bite);content:"";transition:clip-path .35s}
    .face{position:absolute;z-index:3;left:50%;bottom:135px;width:120px;height:55px;transform:translateX(-50%)}.face:before,.face:after{position:absolute;top:5px;width:12px;height:17px;border-radius:50%;background:var(--cocoa);content:""}.face:before{left:20px}.face:after{right:20px}.mouth{position:absolute;left:50%;top:22px;width:26px;height:15px;border-bottom:5px solid var(--cocoa);border-radius:50%;transform:translateX(-50%)}
    .sprinkles{position:absolute;z-index:4;inset:0;pointer-events:none}.sprinkle{position:absolute;width:13px;height:5px;border-radius:4px;background:var(--c);transform:rotate(var(--r))}
    .pressure-pad{position:absolute;z-index:5;right:28px;bottom:28px;display:grid;place-items:center;width:112px;height:82px;border:0;border-radius:50%;background:var(--blue);box-shadow:inset 10px 8px 10px #fff9,inset -10px -10px 12px #548ea033,0 10px 0 #77aebb;font-size:10px;font-weight:bold}.pressure-pad:active,.pressure-pad.pressed{transform:translateY(8px) scaleY(.84);box-shadow:inset 8px 7px 12px #548ea055,0 2px 0 #77aebb}
    .bite-button{position:absolute;z-index:5;left:28px;bottom:28px;width:92px;height:92px;border:0;border-radius:50%;background:var(--yellow);box-shadow:inset 9px 8px 10px #fff9,inset -9px -9px 10px #bb873b44,0 10px 0 #c39a4f;font-size:11px}.bite-button:after{position:absolute;right:-1px;top:5px;width:30px;height:30px;border-radius:50%;background:#f7ddd1;content:""}
    .order-panel{align-self:center;padding:22px;border-radius:30px 60px 30px 60px;background:var(--blue);box-shadow:inset 10px 10px 16px #fff8,inset -10px -12px 18px #609bae55,0 13px 0 #6ca6b5}
    .order-panel h2{margin:0;font-size:19px}.order-panel>p{margin:5px 0 18px;font-size:9px}.steam-valve{position:relative;display:grid;place-items:center;width:118px;height:118px;margin:15px auto;border:9px solid #6ca4b2;border-radius:50%;background:conic-gradient(#fff 0 18deg,#78b9c9 19deg 43deg);box-shadow:inset 0 0 0 12px #a6dded}.steam-valve button{width:55px;height:55px;border:0;border-radius:50%;background:var(--pink);box-shadow:inset 6px 6px #ffd5df,0 5px 0 #b86d80;font-size:9px}.steam-valve.on{animation:valve 3s linear infinite}@keyframes valve{to{transform:rotate(1turn)}}.steam-valve.on button{animation:valve 3s linear infinite reverse}
    .plunger{position:relative;height:170px;margin:18px 0}.plunger-track{position:absolute;left:50%;top:14px;width:42px;height:140px;border-radius:25px;background:#fff8;box-shadow:inset 5px 4px 8px #6e9ca677;transform:translateX(-50%)}.plunger-knob{position:absolute;left:50%;top:var(--top,70px);width:82px;height:55px;border:0;border-radius:50%;background:var(--yellow);box-shadow:inset 8px 7px 9px #fff9,0 8px 0 #c29643;transform:translateX(-50%);font-size:12px}.plunger input{position:absolute;left:50%;top:0;width:140px;height:160px;opacity:0;transform:translateX(-50%);cursor:ns-resize;writing-mode:vertical-lr;direction:rtl}
    .bento{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:9px;border:4px solid var(--cocoa);border-radius:20px;background:#fff1d3}.bento i{aspect-ratio:1;border-radius:45%;background:var(--frost);box-shadow:inset 4px 4px 4px #fff9,0 3px 0 #9d7472}.checkout{width:100%;margin-top:18px;padding:14px;border:0;border-radius:99px;background:var(--cocoa);color:white;box-shadow:0 8px 0 #2d2422;letter-spacing:.08em}.checkout:active{transform:translateY(6px);box-shadow:0 2px 0 #2d2422}
    @media(max-width:1050px){.bakery{grid-template-columns:220px 1fr}.order-panel{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}.order-panel h2,.order-panel>p,.checkout{grid-column:1/-1}.lab{min-height:760px}}
    @media(max-width:700px){.bakery{display:block;padding:8px}.menu-board,.order-panel{margin:12px 0}.lab{min-height:680px}.puff-stage{transform:scale(.82)}.order-panel{display:block}.nozzles{margin-bottom:8px}.awning{height:65px}}
  </style>
</head>
<body>
  <main class="bakery">
    <aside class="menu-board">
      <div class="logo"><i></i></div><h1>mōchi puff lab</h1><p>捏一只今天的软乎乎</p>
      <div class="flavor-beads" id="flavors">
        <button class="flavor active" style="--c:#ffa9bd" data-color="#ffa9bd" aria-label="草莓">莓</button><button class="flavor" style="--c:#a6dded" data-color="#a6dded" aria-label="海盐">盐</button>
        <button class="flavor" style="--c:#ffd66d" data-color="#ffd66d" aria-label="奶黄">奶</button><button class="flavor" style="--c:#bde4bd" data-color="#bde4bd" aria-label="抹茶">茶</button>
      </div>
      <div class="nozzles" id="nozzles">
        <button class="nozzle active" data-tip="✿" aria-label="花嘴"></button><button class="nozzle" data-tip="★" aria-label="星嘴"></button><button class="nozzle" data-tip="●" aria-label="圆嘴"></button>
      </div>
    </aside>

    <section class="lab" id="lab">
      <div class="awning"></div><div class="ticket">ORDER #088<br>FRESH & SQUISHY</div>
      <div class="steam"><i></i><i></i><i></i></div>
      <div class="puff-stage">
        <div class="plate"></div><div class="puff" id="puff"><div class="sprinkles" id="sprinkles"></div></div><div class="face"><i class="mouth"></i></div>
      </div>
      <button class="bite-button" id="bite">咬一口<br>BITE</button>
      <button class="pressure-pad" id="squish">按住试软度</button>
    </section>

    <aside class="order-panel">
      <h2>蒸汽与装盒</h2><p>STEAM VALVE / BENTO COUNTER</p>
      <div class="steam-valve" id="steamValve"><button id="steamButton">蒸汽<br>OFF</button></div>
      <div class="plunger">
        <div class="plunger-track"></div><button class="plunger-knob" id="plungerKnob">× 4</button><input id="quantity" type="range" min="1" max="8" value="4" orient="vertical" aria-label="装盒数量">
      </div>
      <div class="bento" id="bento"></div>
      <button class="checkout" id="checkout">盖上便当盒 · ¥48</button>
    </aside>
  </main>

  <script>
    const root=document.documentElement,sprinkles=document.querySelector("#sprinkles");let tip="✿",bitten=false;
    function sprinkle(){sprinkles.innerHTML="";for(let i=0;i<22;i++){const s=document.createElement("i");s.className="sprinkle";s.style.cssText=`left:${12+Math.random()*76}%;top:${8+Math.random()*45}%;--c:${["#fff","#ffd66d","#6e7fd6","#71b9a4"][i%4]};--r:${Math.random()*160}deg`;s.textContent=tip==="●"?"":"";sprinkles.appendChild(s)}}
    sprinkle();
    document.querySelectorAll(".flavor").forEach(b=>b.onclick=()=>{root.style.setProperty("--frost",b.dataset.color);document.querySelectorAll(".flavor").forEach(x=>x.classList.toggle("active",x===b));renderBento()});
    document.querySelectorAll(".nozzle").forEach(b=>b.onclick=()=>{tip=b.dataset.tip;document.querySelectorAll(".nozzle").forEach(x=>x.classList.toggle("active",x===b));sprinkle()});
    const squish=document.querySelector("#squish");function press(on){squish.classList.toggle("pressed",on);root.style.setProperty("--squish",on?".72":"1")}
    squish.onpointerdown=()=>press(true);squish.onpointerup=squish.onpointerleave=()=>press(false);
    document.querySelector("#bite").onclick=()=>{bitten=!bitten;root.style.setProperty("--bite",bitten?"circle(42px at 100% 25%)":"circle(0 at 100% 25%)")};
    const valve=document.querySelector("#steamValve");document.querySelector("#steamButton").onclick=e=>{valve.classList.toggle("on");document.querySelector("#lab").classList.toggle("steaming");e.currentTarget.textContent=valve.classList.contains("on")?"蒸汽 ON":"蒸汽 OFF"};
    const qty=document.querySelector("#quantity"),bento=document.querySelector("#bento"),knob=document.querySelector("#plungerKnob");
    function renderBento(){bento.innerHTML="";for(let i=0;i<qty.value;i++)bento.appendChild(document.createElement("i"));knob.textContent="× "+qty.value;knob.style.setProperty("--top",(128-qty.value*13)+"px")}
    qty.oninput=renderBento;renderBento();
    document.querySelector("#checkout").onclick=e=>{e.currentTarget.textContent="啪嗒！已封盒 · READY";bento.animate([{transform:"scale(1)"},{transform:"scale(.94)"},{transform:"scale(1)"}],{duration:400})};
  </script>
</body>
</html>

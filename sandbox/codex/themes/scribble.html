<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-signature" content="spiral-planner,draggable-stickies,washi-cutter,focus-timer,sticker-sheet,folded-page,assignment-checkboxes">
  <title>SCRIBBLE — 手账作战本</title>
  <style>
    :root{--paper:#fffdf5;--blue:#2558a6;--pink:#ff75ad;--yellow:#ffe45e;--pencil:#666;--line:#9bc5ea;--tape:#ff84ae}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#d7cab7;color:#293242;font-family:"Comic Sans MS","Kaiti SC",sans-serif}
    button,input{font:inherit;color:inherit}button{cursor:pointer}
    body{background-image:radial-gradient(circle at 20% 20%,#765c4730 0 2px,transparent 3px),repeating-linear-gradient(15deg,transparent 0 23px,#fff2 24px 25px)}
    .desk{position:relative;min-height:100vh;padding:28px 30px 28px 115px;overflow:hidden}
    .coffee{position:absolute;right:3%;top:5%;width:130px;height:130px;border:14px solid #7e4b2b44;border-radius:50%;box-shadow:inset 0 0 0 4px #d7cab7;transform:rotate(12deg)}
    .pencil{position:absolute;left:24px;top:15%;width:22px;height:520px;background:linear-gradient(90deg,#e5bc38 0 25%,#ffe16c 26% 70%,#c99c24 71%);border:2px solid #6f5422;transform:rotate(3deg);box-shadow:7px 8px 8px #6a55453b}.pencil:before{position:absolute;top:-48px;left:-2px;border-left:11px solid transparent;border-right:11px solid transparent;border-bottom:48px solid #d3ad7c;content:""}.pencil:after{position:absolute;top:-48px;left:7px;border-left:4px solid transparent;border-right:4px solid transparent;border-bottom:18px solid #333;content:""}
    .notebook{position:relative;max-width:1240px;min-height:760px;margin:auto;padding-left:44px;background:var(--paper);box-shadow:15px 22px 35px #5c493b44;transform:rotate(-.35deg)}
    .notebook:after{position:absolute;z-index:1;inset:0;pointer-events:none;content:"";background:repeating-linear-gradient(0deg,transparent 0 31px,var(--line) 32px 33px);opacity:.52}
    .margin-line{position:absolute;z-index:2;left:82px;top:0;bottom:0;width:2px;background:#f18fa4aa}
    .spiral{position:absolute;z-index:8;left:-28px;top:18px;bottom:18px;width:70px;display:flex;flex-direction:column;justify-content:space-around}.ring{position:relative;width:64px;height:18px;border:4px solid #5a6070;border-radius:50%;background:linear-gradient(#aaa,#fff,#777);box-shadow:3px 4px 3px #0003}.ring:after{position:absolute;right:-6px;top:4px;width:20px;height:4px;background:#444;content:""}
    .tabs{position:absolute;z-index:6;right:-49px;top:70px;display:grid;gap:9px}.tab{width:70px;padding:11px 7px;border:0;border-radius:0 13px 13px 0;background:var(--c);font-size:10px;font-weight:bold;transform:translateX(-10px);box-shadow:4px 4px 0 #594b4133}.tab.active{transform:translateX(0)}
    .page{position:relative;z-index:3;display:none;min-height:760px;padding:35px 48px 45px}.page.active{display:block}.page-corner{position:absolute;z-index:8;right:0;bottom:0;width:82px;height:82px;border:0;background:linear-gradient(135deg,transparent 49%,#d6cfc1 50%);filter:drop-shadow(-7px -6px 5px #0002)}
    .heading{display:flex;align-items:flex-end;justify-content:space-between;border-bottom:4px solid var(--blue);padding-bottom:8px;transform:rotate(-.4deg)}.heading h1{margin:0;color:var(--blue);font-size:35px;letter-spacing:-.06em}.heading h1 span{position:relative;z-index:1}.heading h1 span:after{position:absolute;z-index:-1;left:-4px;right:-4px;bottom:2px;height:13px;background:var(--yellow);content:"";transform:rotate(-2deg)}.heading p{margin:0;font-size:10px}
    .week{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:25px}.day{position:relative;min-height:190px;padding:35px 11px 12px;border:3px solid var(--blue);border-radius:46% 54% 12px 9px/12px 13px 9px 11px;background:#fff9;transform:rotate(var(--r))}.day h3{position:absolute;top:-16px;left:12px;margin:0;padding:7px 13px;background:var(--c);font-size:12px;transform:rotate(calc(var(--r)*-2))}.day ul{padding:0;list-style:none;font-size:10px;line-height:1.5}.task{display:flex;gap:6px;margin:7px 0;border:0;background:transparent;text-align:left}.task i{flex:0 0 14px;height:14px;border:2px solid var(--blue);transform:rotate(-5deg)}.task.done i:after{display:block;color:var(--pink);content:"✓";font-size:18px;font-weight:bold;line-height:8px}.task.done span{text-decoration:line-through;color:#777}
    .stickies{position:relative;height:320px;margin-top:20px;border:2px dashed #7d899833}.sticky{position:absolute;z-index:5;width:170px;min-height:135px;padding:30px 16px 15px;border:0;background:var(--c);box-shadow:5px 7px 8px #0002;transform:rotate(var(--r));cursor:grab;text-align:left}.sticky:before{position:absolute;left:35%;right:14%;top:8px;height:17px;background:#ffffff77;content:"";transform:rotate(-2deg)}.sticky strong{display:block;margin-bottom:8px;font-size:13px}.sticky p{margin:0;font-size:10px;line-height:1.55}.sticky.dragging{cursor:grabbing;transform:rotate(0) scale(1.03);z-index:20}
    .sidebar-grid{display:grid;grid-template-columns:1fr 250px;gap:24px;margin-top:25px}.paperclip{position:relative;padding:18px 17px 17px 38px;border:2px dashed var(--pencil);background:#fff9}.paperclip:before{position:absolute;left:9px;top:-12px;width:22px;height:59px;border:4px solid #8d9098;border-radius:14px;content:"";transform:rotate(8deg)}.paperclip h3{margin:0 0 11px;color:var(--blue)}.paperclip p{font-size:10px;line-height:1.5}
    .focus{padding:15px;border:3px solid var(--blue);border-radius:18px 28px 16px 25px;background:var(--yellow);transform:rotate(1deg)}.focus h3{margin:0 0 9px;font-size:12px}.timer{position:relative;display:grid;place-items:center;width:120px;height:120px;margin:auto;border:6px solid var(--pink);border-radius:50%;background:var(--paper);font:900 24px ui-monospace,monospace}.timer:before{position:absolute;top:-17px;width:30px;height:18px;border:4px solid var(--blue);border-bottom:0;border-radius:8px 8px 0 0;content:""}.timer:after{position:absolute;left:50%;top:8px;width:3px;height:49px;background:var(--blue);content:"";transform-origin:bottom;transform:rotate(var(--hand,0deg))}.focus button{width:100%;margin-top:10px;padding:8px;border:2px solid var(--blue);background:var(--pink);color:white;font-weight:bold}
    .toolbox{position:absolute;z-index:10;left:14px;right:14px;bottom:-76px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;padding:15px 25px;border:3px solid #4c433b;border-radius:18px;background:#7d6655;box-shadow:0 -7px 16px #4b3d3433;transition:bottom .35s}.toolbox.open{bottom:10px}.handle{position:absolute;left:50%;top:-31px;width:170px;height:32px;border:3px solid #4c433b;border-bottom:0;border-radius:18px 18px 0 0;background:#7d6655;color:white;transform:translateX(-50%);font-size:10px}.tool-section{min-width:0}.tool-section h4{margin:0 0 10px;color:#fff;font-size:9px;letter-spacing:.13em}
    .highlighters,.tapes{display:flex;gap:8px}.highlighter{width:65px;height:25px;border:2px solid #453b34;background:var(--c);transform:skewX(-8deg)}.highlighter.active{outline:3px solid white}.tape{width:70px;height:32px;border:0;background:var(--c);background-image:repeating-linear-gradient(45deg,transparent 0 8px,#fff5 8px 11px);clip-path:polygon(3% 0,97% 4%,100% 90%,4% 100%,0 12%)}.tape.active{filter:drop-shadow(0 0 3px white)}
    .stickers{display:flex;gap:9px}.sticker{display:grid;place-items:center;width:37px;height:37px;border:2px solid white;border-radius:50%;background:var(--c);font-size:18px;box-shadow:2px 3px 0 #41352f}
    .placed-sticker{position:absolute;z-index:7;left:var(--x);top:var(--y);font-size:30px;filter:drop-shadow(2px 2px 0 #fff);transform:rotate(var(--r))}
    .notes-layout{display:grid;grid-template-columns:1fr 280px;gap:25px;margin-top:25px}.brain-dump{min-height:500px;padding:20px;border:3px solid var(--blue);background:#fff9;font-size:13px;line-height:32px;outline:0}.washi-roll{display:grid;gap:13px}.washi-sample{height:45px;border:0;background:var(--c);background-image:repeating-linear-gradient(90deg,transparent 0 18px,#fff5 18px 25px);clip-path:polygon(0 9%,100% 0,98% 90%,2% 100%)}.washi-sample.active{outline:3px dashed var(--blue);outline-offset:4px}
    @media(max-width:950px){.desk{padding-left:80px}.week{grid-template-columns:repeat(3,1fr)}.day{min-height:160px}.sidebar-grid{grid-template-columns:1fr}.notebook{min-height:920px}.page{min-height:920px}.toolbox{grid-template-columns:1fr;bottom:-250px}.toolbox.open{bottom:8px}}
    @media(max-width:650px){.desk{padding:10px 42px 10px 45px}.pencil{display:none}.notebook{padding-left:25px}.page{padding:25px 18px;min-height:1100px}.margin-line{left:48px}.week{grid-template-columns:1fr 1fr}.tabs{right:-42px}.notes-layout{display:block}.washi-roll{margin-top:20px}.heading h1{font-size:26px}.stickies{height:400px}}
  </style>
</head>
<body>
  <main class="desk">
    <div class="coffee"></div><div class="pencil"></div>
    <section class="notebook">
      <div class="margin-line"></div>
      <div class="spiral" id="spiral"></div>
      <nav class="tabs"><button class="tab active" style="--c:#ffe45e" data-page="plan">PLAN</button><button class="tab" style="--c:#ff91b9" data-page="notes">NOTES</button><button class="tab" style="--c:#8fd8eb" id="toolTab">TOOLS</button></nav>

      <article class="page active" id="plan">
        <header class="heading"><h1>this week's <span>battle plan!</span></h1><p>WK 28 / keep going →</p></header>
        <div class="week">
          <section class="day" style="--r:-1deg;--c:#ffe45e"><h3>MON</h3><button class="task"><i></i><span>交互原型 v2</span></button><button class="task done"><i></i><span>买新的蓝笔</span></button><button class="task"><i></i><span>给阿卓回信</span></button></section>
          <section class="day" style="--r:.8deg;--c:#ffa3c4"><h3>TUE</h3><button class="task"><i></i><span>11:00 评审</span></button><button class="task"><i></i><span>整理照片</span></button></section>
          <section class="day" style="--r:-.5deg;--c:#9bddeb"><h3>WED</h3><button class="task"><i></i><span>深度工作 2h</span></button><button class="task"><i></i><span>跑步 5km</span></button></section>
          <section class="day" style="--r:1deg;--c:#bde4bd"><h3>THU</h3><button class="task"><i></i><span>读完第三章</span></button><button class="task"><i></i><span>备份硬盘</span></button></section>
          <section class="day" style="--r:-.8deg;--c:#ffd19a"><h3>FRI</h3><button class="task"><i></i><span>把花带回家</span></button><button class="task"><i></i><span>周复盘 ✦</span></button></section>
        </div>
        <div class="sidebar-grid">
          <div class="stickies" id="stickies">
            <button class="sticky" style="--c:#ffe45e;--r:-2deg;left:4%;top:25px"><strong>别忘了！</strong><p>所有“以后再说”都应该写进日历，不要只放脑子里。</p></button>
            <button class="sticky" style="--c:#ffb2cd;--r:2deg;left:39%;top:78px"><strong>灵感碎片</strong><p>把加载状态画成一颗慢慢长大的豆子？</p></button>
            <button class="sticky" style="--c:#a9dfee;--r:-1deg;left:70%;top:19px"><strong>本周关键词</strong><p>少一点完美，多一点完成。</p></button>
          </div>
          <div><section class="paperclip"><h3>夹进来的纸条</h3><p>“给计划留一点呼吸，空白也算安排。”</p></section><section class="focus"><h3>发条专注钟</h3><div class="timer" id="timer">25:00</div><button id="timerButton">拧紧发条</button></section></div>
        </div>
        <button class="page-corner" data-next="notes" aria-label="翻到笔记页"></button>
      </article>

      <article class="page" id="notes">
        <header class="heading"><h1>messy <span>brain dump</span></h1><p>NO ERASING / JUST THINKING</p></header>
        <div class="notes-layout">
          <div class="brain-dump" contenteditable="true" id="brainDump">今天想到：<br>界面不应该只是“整齐”，还要有可以记住的动作。<br><br>→ 尝试让每个主题拥有一种完全不同的主控件。<br>→ 空白不是没有设计，是节奏。</div>
          <aside><div class="paperclip"><h3>撕下来的清单</h3><button class="task"><i></i><span>查阅书架</span></button><button class="task"><i></i><span>做三张草图</span></button><button class="task"><i></i><span>关掉通知</span></button></div><div class="washi-roll"><button class="washi-sample active" style="--c:#ff8eb5"></button><button class="washi-sample" style="--c:#84d4e8"></button><button class="washi-sample" style="--c:#ffe05d"></button></div></aside>
        </div>
        <button class="page-corner" data-next="plan" aria-label="翻回计划页"></button>
      </article>

      <aside class="toolbox" id="toolbox">
        <button class="handle" id="toolHandle">掀开铅笔盒 ↑</button>
        <section class="tool-section"><h4>HIGHLIGHTERS</h4><div class="highlighters"><button class="highlighter active" style="--c:#ffe45e" data-highlight="#ffe45e"></button><button class="highlighter" style="--c:#ff91b9" data-highlight="#ff91b9"></button><button class="highlighter" style="--c:#8edbea" data-highlight="#8edbea"></button></div></section>
        <section class="tool-section"><h4>WASHI CUTTER</h4><div class="tapes"><button class="tape active" style="--c:#ff84ae"></button><button class="tape" style="--c:#66cadd"></button><button class="tape" style="--c:#f3cd45"></button></div></section>
        <section class="tool-section"><h4>STICKER SHEET</h4><div class="stickers"><button class="sticker" style="--c:#ff9ebf">★</button><button class="sticker" style="--c:#ffe45e">☻</button><button class="sticker" style="--c:#8edbea">✿</button><button class="sticker" style="--c:#bde4bd">✓</button></div></section>
      </aside>
    </section>
  </main>

  <script>
    const spiral=document.querySelector("#spiral");for(let i=0;i<18;i++)spiral.appendChild(Object.assign(document.createElement("i"),{className:"ring"}));
    function showPage(id){document.querySelectorAll(".page").forEach(p=>p.classList.toggle("active",p.id===id));document.querySelectorAll("[data-page]").forEach(t=>t.classList.toggle("active",t.dataset.page===id))}
    document.querySelectorAll("[data-page]").forEach(t=>t.onclick=()=>showPage(t.dataset.page));document.querySelectorAll("[data-next]").forEach(b=>b.onclick=()=>showPage(b.dataset.next));
    document.querySelectorAll(".task").forEach(t=>t.onclick=()=>t.classList.toggle("done"));
    document.querySelectorAll(".sticky").forEach(s=>{let sx,sy,l,t;s.onpointerdown=e=>{sx=e.clientX;sy=e.clientY;l=s.offsetLeft;t=s.offsetTop;s.classList.add("dragging");s.setPointerCapture(e.pointerId)};s.onpointermove=e=>{if(sx===undefined)return;s.style.left=l+e.clientX-sx+"px";s.style.top=t+e.clientY-sy+"px"};s.onpointerup=()=>{sx=undefined;s.classList.remove("dragging")}});
    let time=1500,ticking=false,tick;const timer=document.querySelector("#timer"),timerButton=document.querySelector("#timerButton");function renderTime(){timer.textContent=String(Math.floor(time/60)).padStart(2,"0")+":"+String(time%60).padStart(2,"0");timer.style.setProperty("--hand",(1500-time)/1500*360+"deg")}
    timerButton.onclick=()=>{ticking=!ticking;timerButton.textContent=ticking?"暂停一下":"继续发条";clearInterval(tick);if(ticking)tick=setInterval(()=>{if(time>0){time--;renderTime()}else{clearInterval(tick);ticking=false;timerButton.textContent="叮！完成一轮"}},1000)};
    const toolbox=document.querySelector("#toolbox");document.querySelector("#toolTab").onclick=document.querySelector("#toolHandle").onclick=()=>{toolbox.classList.toggle("open");document.querySelector("#toolHandle").textContent=toolbox.classList.contains("open")?"合上铅笔盒 ↓":"掀开铅笔盒 ↑"};
    document.querySelectorAll(".highlighter").forEach(h=>h.onclick=()=>{document.documentElement.style.setProperty("--yellow",h.dataset.highlight);document.querySelectorAll(".highlighter").forEach(x=>x.classList.toggle("active",x===h))});
    document.querySelectorAll(".tape,.washi-sample").forEach(t=>t.onclick=()=>{document.querySelectorAll(t.classList.contains("tape")?".tape":".washi-sample").forEach(x=>x.classList.toggle("active",x===t));document.documentElement.style.setProperty("--tape",getComputedStyle(t).getPropertyValue("--c"))});
    document.querySelectorAll(".sticker").forEach((s,i)=>s.onclick=()=>{const p=document.createElement("b");p.className="placed-sticker";p.textContent=s.textContent;p.style.cssText=`--x:${25+i*14}%;--y:${20+i*11}%;--r:${i*17-22}deg`;document.querySelector(".notebook").appendChild(p)});
  </script>
</body>
</html>
